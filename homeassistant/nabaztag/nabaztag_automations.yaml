# =========================
# Nabaztag - Automatisations
# =========================
#
# Architecture:
# - Nabaztag Life: actions aléatoires (nabaztag_life.yaml)
# - Reconnexion: /setup + restore LEDs au démarrage HA ou reconnexion Nabaztag

automation:

  # ========== RECONNEXION - SETUP + RESTORE LEDs ==========
  # Déclenché quand HA démarre OU Nabaztag se reconnecte

  - id: nabaztag_reconnexion
    alias: "Nabaztag - Reconnexion"
    description: "Envoie /setup et restaure LEDs enabled au démarrage HA ou reconnexion"
    mode: single
    trigger:
      - trigger: state
        entity_id: binary_sensor.ping_nabaztag
        to: "on"
      - trigger: homeassistant
        event: start
      - trigger: state
        entity_id: binary_sensor.nabaztag_rebooted
        to: "on"
    condition:
      - condition: state
        entity_id: binary_sensor.ping_nabaztag
        state: "on"
    action:
      - action: rest_command.nabaztag_setup
      - delay:
          seconds: 2
      - action: shell_command.nabaztag_telnet_load_animations
      - action: script.nabaztag_restore_leds
      # Écrire les flags HA → lapin
      - action: shell_command.nabaztag_telnet_clock
        data:
          clock: "{{ '1' if states('input_boolean.nabaztag_firmware_clock') == 'on' else '0' }}"
      - action: shell_command.nabaztag_telnet_halftime
        data:
          halftime: "{{ '1' if states('input_boolean.nabaztag_firmware_halftime') == 'on' else '0' }}"
      - action: shell_command.nabaztag_telnet_surprise_flag
        data:
          surprise: "{{ '1' if states('input_boolean.nabaztag_firmware_surprise') == 'on' else '0' }}"
      - action: shell_command.nabaztag_telnet_taichi_flag
        data:
          taichi: "{{ '1' if states('input_boolean.nabaztag_firmware_taichi') == 'on' else '0' }}"

  # ========== GESTION LEDs PAR INTERRUPTEUR ==========
  # Quand utilisateur toggle un switch (weather/traffic/pollution/nose)

  - id: nabaztag_led_toggle
    alias: "Nabaztag - Toggle LED"
    description: "Enable/disable LED spécifique selon input_boolean"
    mode: single
    trigger:
      - trigger: state
        entity_id: input_boolean.nabaztag_weather_enabled
        id: weather
      - trigger: state
        entity_id: input_boolean.nabaztag_traffic_enabled
        id: traffic
      - trigger: state
        entity_id: input_boolean.nabaztag_pollution_enabled
        id: pollution
      - trigger: state
        entity_id: input_boolean.nabaztag_nose_enabled
        id: nose
    condition:
      - condition: state
        entity_id: binary_sensor.ping_nabaztag
        state: "on"
    action:
      - choose:
          - conditions:
              - condition: trigger
                id: weather
            sequence:
              - action: script.nabaztag_toggle_weather
          - conditions:
              - condition: trigger
                id: traffic
            sequence:
              - action: script.nabaztag_toggle_traffic
          - conditions:
              - condition: trigger
                id: pollution
            sequence:
              - action: script.nabaztag_toggle_pollution
          - conditions:
              - condition: trigger
                id: nose
            sequence:
              - action: script.nabaztag_toggle_nose

  # ========== MISE À JOUR TRAFIC ==========
  # Envoie la valeur du trafic au lapin quand input_number change
  # La source peut être Waze (automatique) ou manuelle (HA)

  - id: nabaztag_traffic_update
    alias: "Nabaztag - Update Traffic"
    description: "Envoie traffic au Nabaztag quand input_number.nabaztag_traffic change"
    mode: single
    trigger:
      - trigger: state
        entity_id: input_number.nabaztag_traffic
    condition:
      - condition: state
        entity_id: binary_sensor.ping_nabaztag
        state: "on"
      - condition: state
        entity_id: input_boolean.nabaztag_traffic_enabled
        state: "on"
    action:
      - action: shell_command.nabaztag_telnet_traffic


  # ========== FIRMWARE FLAGS TOGGLE ==========
  # Envoie la commande telnet quand l'input_boolean change

  - id: nabaztag_firmware_toggle_clock
    alias: "Nabaztag - Toggle Clock"
    mode: single
    trigger:
      - trigger: state
        entity_id: input_boolean.nabaztag_firmware_clock
    condition:
      - condition: state
        entity_id: binary_sensor.ping_nabaztag
        state: "on"
    action:
      - action: shell_command.nabaztag_telnet_clock
        data:
          clock: "{{ '1' if states('input_boolean.nabaztag_firmware_clock') == 'on' else '0' }}"
      - delay:
          seconds: 1
      - action: homeassistant.update_entity
        target:
          entity_id: sensor.nabaztag_telnet_status

  - id: nabaztag_firmware_toggle_halftime
    alias: "Nabaztag - Toggle Halftime"
    mode: single
    trigger:
      - trigger: state
        entity_id: input_boolean.nabaztag_firmware_halftime
    condition:
      - condition: state
        entity_id: binary_sensor.ping_nabaztag
        state: "on"
    action:
      - action: shell_command.nabaztag_telnet_halftime
        data:
          halftime: "{{ '1' if states('input_boolean.nabaztag_firmware_halftime') == 'on' else '0' }}"
      - delay:
          seconds: 1
      - action: homeassistant.update_entity
        target:
          entity_id: sensor.nabaztag_telnet_status

  - id: nabaztag_firmware_toggle_surprise
    alias: "Nabaztag - Toggle Surprise"
    mode: single
    trigger:
      - trigger: state
        entity_id: input_boolean.nabaztag_firmware_surprise
    condition:
      - condition: state
        entity_id: binary_sensor.ping_nabaztag
        state: "on"
    action:
      - action: shell_command.nabaztag_telnet_surprise_flag
        data:
          surprise: "{{ '1' if states('input_boolean.nabaztag_firmware_surprise') == 'on' else '0' }}"
      - delay:
          seconds: 1
      - action: homeassistant.update_entity
        target:
          entity_id: sensor.nabaztag_telnet_status

  - id: nabaztag_firmware_toggle_taichi
    alias: "Nabaztag - Toggle Taichi"
    mode: single
    trigger:
      - trigger: state
        entity_id: input_boolean.nabaztag_firmware_taichi
    condition:
      - condition: state
        entity_id: binary_sensor.ping_nabaztag
        state: "on"
    action:
      - action: shell_command.nabaztag_telnet_taichi_flag
        data:
          taichi: "{{ '1' if states('input_boolean.nabaztag_firmware_taichi') == 'on' else '0' }}"
      - delay:
          seconds: 1
      - action: homeassistant.update_entity
        target:
          entity_id: sensor.nabaztag_telnet_status


  # ========== AUTO-CORRECT SI DÉSYNCHRO ==========
  # Déclenché quand le capteur telnet se met à jour
  # et que la config firmware est désynchronisée

  - id: nabaztag_auto_correct
    alias: "Nabaztag - Auto-correct config"
    description: "Re-synchronise les flags firmware si désynchronisation détectée"
    mode: single
    trigger:
      - trigger: state
        entity_id: sensor.nabaztag_telnet_status
    condition:
      - condition: state
        entity_id: binary_sensor.configuration_firmware_synchronisee
        state: "off"
      - condition: state
        entity_id: binary_sensor.ping_nabaztag
        state: "on"
    action:
      - action: shell_command.nabaztag_telnet_clock
        data:
          clock: "{{ '1' if states('input_boolean.nabaztag_firmware_clock') == 'on' else '0' }}"
      - action: shell_command.nabaztag_telnet_halftime
        data:
          halftime: "{{ '1' if states('input_boolean.nabaztag_firmware_halftime') == 'on' else '0' }}"
      - action: shell_command.nabaztag_telnet_surprise_flag
        data:
          surprise: "{{ '1' if states('input_boolean.nabaztag_firmware_surprise') == 'on' else '0' }}"
      - action: shell_command.nabaztag_telnet_taichi_flag
        data:
          taichi: "{{ '1' if states('input_boolean.nabaztag_firmware_taichi') == 'on' else '0' }}"

  # ========== ALERTE DÉSYNCHRO PERSISTANTE ==========
  # Allume un input_boolean si la désynchro dure > 2 min

  - id: nabaztag_desync_alert
    alias: "Nabaztag - Alerte désynchro"
    description: "Allume nabaztag_config_desync si désynchro persistante après 2 min"
    mode: single
    trigger:
      - platform: state
        entity_id: binary_sensor.configuration_firmware_synchronisee
        to: "off"
        for:
          minutes: 2
    condition:
      - condition: state
        entity_id: binary_sensor.configuration_firmware_synchronisee
        state: "off"
    action:
      - action: input_boolean.turn_on
        target:
          entity_id: input_boolean.nabaztag_config_desync

  - id: nabaztag_desync_clear
    alias: "Nabaztag - Alerte désynchro fin"
    description: "Éteint nabaztag_config_desync quand la synchro est rétablie"
    mode: single
    trigger:
      - platform: state
        entity_id: binary_sensor.configuration_firmware_synchronisee
        to: "on"
    action:
      - action: input_boolean.turn_off
        target:
          entity_id: input_boolean.nabaztag_config_desync  # ========== INFO AUTO-UPDATE TOGGLE ==========
  # Permet de désactiver la mise à jour automatique Open-Meteo
  # pour la météo et la pollution (override par HA)

  - id: nabaztag_auto_weather_toggle
    alias: "Nabaztag - Toggle Auto Weather"
    mode: single
    trigger:
      - trigger: state
        entity_id: input_boolean.nabaztag_auto_weather
    condition:
      - condition: state
        entity_id: binary_sensor.ping_nabaztag
        state: "on"
    action:
      - action: shell_command.nabaztag_telnet_auto_weather
        data:
          auto_weather: "{{ '1' if states('input_boolean.nabaztag_auto_weather') == 'on' else '0' }}"
      - delay:
          seconds: 1
      - action: homeassistant.update_entity
        target:
          entity_id: sensor.nabaztag_telnet_status

  - id: nabaztag_auto_pollution_toggle
    alias: "Nabaztag - Toggle Auto Pollution"
    mode: single
    trigger:
      - trigger: state
        entity_id: input_boolean.nabaztag_auto_pollution
    condition:
      - condition: state
        entity_id: binary_sensor.ping_nabaztag
        state: "on"
    action:
      - action: shell_command.nabaztag_telnet_auto_pollution
        data:
          auto_pollution: "{{ '1' if states('input_boolean.nabaztag_auto_pollution') == 'on' else '0' }}"
      - delay:
          seconds: 1
      - action: homeassistant.update_entity
        target:
          entity_id: sensor.nabaztag_telnet_status

