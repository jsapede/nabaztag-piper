# =========================
# Nabaztag - Automatisations
# =========================
#
# Architecture:
# - Reconnexion: /setup + restore LEDs au démarrage HA ou reconnexion Nabaztag

automation:

  # ========== RECONNEXION - SETUP + RESTORE LEDs ==========
  # Déclenché quand HA démarre OU Nabaztag se reconnecte

  - id: nabaztag_reconnexion
    alias: "Nabaztag - Reconnexion"
    description: "Envoie /setup et restaure LEDs enabled au démarrage HA ou reconnexion"
    mode: single
    trigger:
      - trigger: state
        entity_id: binary_sensor.ping_nabaztag
        to: "on"
      - trigger: homeassistant
        event: start
    condition:
      - condition: state
        entity_id: binary_sensor.ping_nabaztag
        state: "on"
    action:
      - action: rest_command.nabaztag_setup
      - action: script.nabaztag_restore_leds
      - action: shell_command.nabaztag_telnet_clock
        data:
          clock: "{{ '1' if states('input_boolean.nabaztag_firmware_clock') == 'on' else '0' }}"
      - action: shell_command.nabaztag_telnet_halftime
        data:
          halftime: "{{ '1' if states('input_boolean.nabaztag_firmware_halftime') == 'on' else '0' }}"
      - action: shell_command.nabaztag_telnet_surprise_flag
        data:
          surprise: "{{ '1' if states('input_boolean.nabaztag_firmware_surprise') == 'on' else '0' }}"
      - action: shell_command.nabaztag_telnet_taichi_flag
        data:
          taichi: "{{ '1' if states('input_boolean.nabaztag_firmware_taichi') == 'on' else '0' }}"

  # ========== GESTION LEDs PAR INTERRUPTEUR ==========
  # Quand utilisateur toggle un switch (weather/traffic/pollution/nose)

  - id: nabaztag_led_toggle
    alias: "Nabaztag - Toggle LED"
    description: "Enable/disable LED spécifique selon input_boolean"
    mode: single
    trigger:
      - trigger: state
        entity_id: input_boolean.nabaztag_weather_enabled
        id: weather
      - trigger: state
        entity_id: input_boolean.nabaztag_traffic_enabled
        id: traffic
      - trigger: state
        entity_id: input_boolean.nabaztag_pollution_enabled
        id: pollution
      - trigger: state
        entity_id: input_boolean.nabaztag_nose_enabled
        id: nose
    condition:
      - condition: state
        entity_id: binary_sensor.ping_nabaztag
        state: "on"
    action:
      - choose:
          - conditions:
              - condition: trigger
                id: weather
            sequence:
              - action: script.nabaztag_toggle_weather
          - conditions:
              - condition: trigger
                id: traffic
            sequence:
              - action: script.nabaztag_toggle_traffic
          - conditions:
              - condition: trigger
                id: pollution
            sequence:
              - action: script.nabaztag_toggle_pollution
          - conditions:
              - condition: trigger
                id: nose
            sequence:
              - action: script.nabaztag_toggle_nose

  # ========== MISE À JOUR TRAFIC ==========
  # Envoie la valeur du trafic au lapin quand input_number change
  # La source peut être Waze (automatique) ou manuelle (HA)

  - id: nabaztag_traffic_update
    alias: "Nabaztag - Update Traffic"
    description: "Envoie traffic au Nabaztag quand input_number.nabaztag_traffic change"
    mode: single
    trigger:
      - trigger: state
        entity_id: input_number.nabaztag_traffic
    condition:
      - condition: state
        entity_id: binary_sensor.ping_nabaztag
        state: "on"
      - condition: state
        entity_id: input_boolean.nabaztag_traffic_enabled
        state: "on"
    action:
      - action: shell_command.nabaztag_telnet_traffic


  # ========== FIRMWARE FLAGS TOGGLE ==========
  # Envoie la commande telnet quand l'input_boolean change

  - id: nabaztag_firmware_toggle_clock
    alias: "Nabaztag - Toggle Clock"
    mode: single
    trigger:
      - trigger: state
        entity_id: input_boolean.nabaztag_firmware_clock
    condition:
      - condition: state
        entity_id: binary_sensor.ping_nabaztag
        state: "on"
    action:
      - action: shell_command.nabaztag_telnet_clock
        data:
          clock: "{{ '1' if states('input_boolean.nabaztag_firmware_clock') == 'on' else '0' }}"
      - delay:
          seconds: 5
      - action: homeassistant.update_entity
        target:
          entity_id: sensor.nabaztag_telnet_status

  - id: nabaztag_firmware_toggle_halftime
    alias: "Nabaztag - Toggle Halftime"
    mode: single
    trigger:
      - trigger: state
        entity_id: input_boolean.nabaztag_firmware_halftime
    condition:
      - condition: state
        entity_id: binary_sensor.ping_nabaztag
        state: "on"
    action:
      - action: shell_command.nabaztag_telnet_halftime
        data:
          halftime: "{{ '1' if states('input_boolean.nabaztag_firmware_halftime') == 'on' else '0' }}"
      - delay:
          seconds: 5
      - action: homeassistant.update_entity
        target:
          entity_id: sensor.nabaztag_telnet_status

  - id: nabaztag_firmware_toggle_surprise
    alias: "Nabaztag - Toggle Surprise"
    mode: single
    trigger:
      - trigger: state
        entity_id: input_boolean.nabaztag_firmware_surprise
    condition:
      - condition: state
        entity_id: binary_sensor.ping_nabaztag
        state: "on"
    action:
      - action: shell_command.nabaztag_telnet_surprise_flag
        data:
          surprise: "{{ '1' if states('input_boolean.nabaztag_firmware_surprise') == 'on' else '0' }}"
      - delay:
          seconds: 5
      - action: homeassistant.update_entity
        target:
          entity_id: sensor.nabaztag_telnet_status

  - id: nabaztag_firmware_toggle_taichi
    alias: "Nabaztag - Toggle Taichi"
    mode: single
    trigger:
      - trigger: state
        entity_id: input_boolean.nabaztag_firmware_taichi
    condition:
      - condition: state
        entity_id: binary_sensor.ping_nabaztag
        state: "on"
    action:
      - action: shell_command.nabaztag_telnet_taichi_flag
        data:
          taichi: "{{ '1' if states('input_boolean.nabaztag_firmware_taichi') == 'on' else '0' }}"
      - delay:
          seconds: 5
      - action: homeassistant.update_entity
        target:
          entity_id: sensor.nabaztag_telnet_status

  # ========== AUTO DST ==========
  - id: nabaztag_auto_dst
    alias: "Nabaztag - Auto DST"
    description: "Déclenche /setup pour appliquer DST (calculé par HA)"
    mode: single
    trigger:
      - trigger: homeassistant
        event: start
      - trigger: time_pattern
        hours: /1
      - trigger: state
        entity_id: input_boolean.nabaztag_auto_dst
    condition:
      - condition: state
        entity_id: input_boolean.nabaztag_auto_dst
        state: "on"
      - condition: state
        entity_id: binary_sensor.ping_nabaztag
        state: "on"
    action:
      - action: rest_command.nabaztag_setup_dst

  # ========== WAZE → TRAFFIC ==========
  - id: nabaztag_waze_traffic
    alias: "Nabaztag - Waze Traffic"
    description: "Quand le niveau trafic Waze change, met à jour input_number"
    mode: single
    trigger:
      - trigger: state
        entity_id: sensor.trafic_niveau
      - trigger: state
        entity_id: input_boolean.nabaztag_traffic_auto_update
        to: "on"
    condition:
      - condition: state
        entity_id: input_boolean.nabaztag_traffic_auto_update
        state: "on"
      - condition: template
        value_template: "{{ states('sensor.trafic_niveau') not in ['unavailable', 'none', 'unknown'] }}"
    action:
      - action: input_number.set_value
        target:
          entity_id: input_number.nabaztag_traffic
        data:
          value: "{{ states('sensor.trafic_niveau') | int }}"

  # ========== MÉTÉO → WEATHER ==========
  - id: nabaztag_weather_auto
    alias: "Nabaztag - Météo Auto"
    description: "weather_code → input_number → forwardé au lapin"
    mode: single
    trigger:
      - trigger: state
        entity_id: sensor.meteo_niveau
      - trigger: state
        entity_id: input_boolean.nabaztag_weather_auto_update
        to: "on"
    condition:
      - condition: state
        entity_id: input_boolean.nabaztag_weather_auto_update
        state: "on"
      - condition: template
        value_template: "{{ states('sensor.meteo_niveau') not in ['unavailable', 'none', 'unknown'] }}"
    action:
      - action: input_number.set_value
        target:
          entity_id: input_number.nabaztag_weather
        data:
          value: "{{ states('sensor.meteo_niveau') | int }}"

  # ========== WEATHER → LAPIN ==========
  - id: nabaztag_weather_update
    alias: "Nabaztag - Update Weather"
    description: "Envoie météo au lapin quand input_number change"
    mode: single
    trigger:
      - trigger: state
        entity_id: input_number.nabaztag_weather
    condition:
      - condition: state
        entity_id: binary_sensor.ping_nabaztag
        state: "on"
      - condition: state
        entity_id: input_boolean.nabaztag_weather_enabled
        state: "on"
    action:
      - action: shell_command.nabaztag_telnet_weather

  # ========== POLLUTION → INPUT ==========
  - id: nabaztag_pollution_auto
    alias: "Nabaztag - Pollution Auto"
    description: "sensor AQI → input_number → forwardé au lapin"
    mode: single
    trigger:
      - trigger: state
        entity_id: sensor.pollution_niveau
      - trigger: state
        entity_id: input_boolean.nabaztag_pollution_auto_update
        to: "on"
    condition:
      - condition: state
        entity_id: input_boolean.nabaztag_pollution_auto_update
        state: "on"
      - condition: template
        value_template: "{{ states('sensor.pollution_niveau') not in ['unavailable', 'none', 'unknown'] }}"
    action:
      - action: input_number.set_value
        target:
          entity_id: input_number.nabaztag_pollution
        data:
          value: "{{ states('sensor.pollution_niveau') | int }}"

  # ========== POLLUTION → LAPIN ==========
  - id: nabaztag_pollution_update
    alias: "Nabaztag - Update Pollution"
    description: "Envoie pollution au lapin quand input_number change"
    mode: single
    trigger:
      - trigger: state
        entity_id: input_number.nabaztag_pollution
    condition:
      - condition: state
        entity_id: binary_sensor.ping_nabaztag
        state: "on"
      - condition: state
        entity_id: input_boolean.nabaztag_pollution_enabled
        state: "on"
    action:
      - action: shell_command.nabaztag_telnet_pollution

