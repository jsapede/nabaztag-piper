# =========================
# Nabaztag - Automatisations
# =========================
#
# Architecture:
# - Nabaztag Life: actions aleatoires (nabaztag_life.yaml)
# - Reconnexion: /setup + restore LEDs au demarrage HA ou reconnexion Nabaztag
#
# Tous les appels REST utilisent les 2 commands generiques:
# - rest_command.nabaztag_api (endpoint + query)
# - rest_command.nabaztag_autocontrol (c/h/s/t)

automation:

  # ========== RECONNEXION - SETUP + RESTORE LEDs ==========

  - id: nabaztag_reconnexion
    alias: "Nabaztag - Reconnexion"
    description: "Envoie /setup et restaure LEDs enabled au demarrage HA ou reconnexion"
    mode: single
    trigger:
      - trigger: state
        entity_id: binary_sensor.ping_nabaztag
        to: "on"
      - trigger: homeassistant
        event: start
    condition:
      - condition: state
        entity_id: binary_sensor.ping_nabaztag
        state: "on"
    action:
      - action: rest_command.nabaztag_api
        data:
          endpoint: setup
          query: "j={{ state_attr('zone.home', 'latitude') | round(3) }}&k={{ state_attr('zone.home', 'longitude') | round(3) }}&l={{ states('input_select.nabaztag_language') }}&c={{ {'Europe/Paris': 'PAR', 'Europe/London': 'LON', 'America/New_York': 'NYC', 'Asia/Tokyo': 'TYO'}[states('input_select.nabaztag_timezone_city')]|default('PAR') }}&d={{ 1 if is_state('input_boolean.nabaztag_daylight_saving', 'on') else 0 }}&w={{ states('input_number.nabaztag_wake_hour') | int }}&b={{ states('input_number.nabaztag_sleep_hour') | int }}&t={{ states('input_number.nabaztag_taichi_freq') | int }}"
      - action: script.nabaztag_restore_leds
      - action: rest_command.nabaztag_autocontrol
        data:
          clock: "{{ '1' if states('input_boolean.nabaztag_firmware_clock') == 'on' else '0' }}"
          halftime: "{{ '1' if states('input_boolean.nabaztag_firmware_halftime') == 'on' else '0' }}"
          surprise: "{{ '1' if states('input_boolean.nabaztag_firmware_surprise') == 'on' else '0' }}"
          taichi: "{{ '1' if states('input_boolean.nabaztag_firmware_taichi') == 'on' else '0' }}"

  # ========== GESTION LEDs PAR INTERRUPTEUR ==========

  - id: nabaztag_led_toggle
    alias: "Nabaztag - Toggle LED"
    description: "Enable/disable LED specifique selon input_boolean"
    mode: single
    trigger:
      - trigger: state
        entity_id:
          - input_boolean.nabaztag_weather_enabled
          - input_boolean.nabaztag_traffic_enabled
          - input_boolean.nabaztag_pollution_enabled
          - input_boolean.nabaztag_nose_enabled
    condition:
      - condition: state
        entity_id: binary_sensor.ping_nabaztag
        state: "on"
    action:
      - choose:
          - conditions:
              - condition: state
                entity_id: input_boolean.nabaztag_weather_enabled
                state: "on"
            sequence:
              - action: script.nabaztag_toggle_weather
          - conditions:
              - condition: state
                entity_id: input_boolean.nabaztag_weather_enabled
                state: "off"
            sequence:
              - action: script.nabaztag_toggle_weather
          - conditions:
              - condition: state
                entity_id: input_boolean.nabaztag_traffic_enabled
                state: "on"
            sequence:
              - action: script.nabaztag_toggle_traffic
          - conditions:
              - condition: state
                entity_id: input_boolean.nabaztag_traffic_enabled
                state: "off"
            sequence:
              - action: script.nabaztag_toggle_traffic
          - conditions:
              - condition: state
                entity_id: input_boolean.nabaztag_pollution_enabled
                state: "on"
            sequence:
              - action: script.nabaztag_toggle_pollution
          - conditions:
              - condition: state
                entity_id: input_boolean.nabaztag_pollution_enabled
                state: "off"
            sequence:
              - action: script.nabaztag_toggle_pollution
          - conditions:
              - condition: state
                entity_id: input_boolean.nabaztag_nose_enabled
                state: "on"
            sequence:
              - action: script.nabaztag_toggle_nose
          - conditions:
              - condition: state
                entity_id: input_boolean.nabaztag_nose_enabled
                state: "off"
            sequence:
              - action: script.nabaztag_toggle_nose

  # ========== MISE A JOUR TRAFIC WAZE ==========

  - id: nabaztag_traffic_update
    alias: "Nabaztag - Update Traffic"
    description: "Envoie traffic au Nabaztag base sur sensor Waze"
    mode: single
    trigger:
      - trigger: state
        entity_id: sensor.waze_trajet_domicile_travail
    condition:
      - condition: state
        entity_id: binary_sensor.ping_nabaztag
        state: "on"
      - condition: state
        entity_id: input_boolean.nabaztag_traffic_enabled
        state: "on"
    action:
      - variables:
          duration: "{{ trigger.to_state.state | float(0) }}"
          traffic_level: >
            {% if duration < 20 %}0
            {% elif duration < 25 %}1
            {% elif duration < 30 %}2
            {% elif duration < 35 %}3
            {% elif duration < 45 %}4
            {% elif duration < 60 %}5
            {% else %}6
            {% endif %}
      - action: input_number.set_value
        target:
          entity_id: input_number.nabaztag_traffic
        data:
          value: "{{ traffic_level }}"
      - action: rest_command.nabaztag_api
        data:
          endpoint: traffic
          query: "v={{ traffic_level }}"

  # ========== FIRMWARE AUTO CONTROL TOGGLE ==========
  # Un seul appel nabaztag_autocontrol avec les 4 flags
  # Les parametres non modifies sont re-envoyes (harmless)

  - id: nabaztag_firmware_toggle
    alias: "Nabaztag - Toggle Firmware"
    description: "Enable/disable auto-control firmware (clock/halftime/surprise/taichi)"
    mode: single
    trigger:
      - trigger: state
        entity_id:
          - input_boolean.nabaztag_firmware_clock
          - input_boolean.nabaztag_firmware_halftime
          - input_boolean.nabaztag_firmware_surprise
          - input_boolean.nabaztag_firmware_taichi
    condition:
      - condition: state
        entity_id: binary_sensor.ping_nabaztag
        state: "on"
    action:
      - action: rest_command.nabaztag_autocontrol
        data:
          clock: "{{ '1' if states('input_boolean.nabaztag_firmware_clock') == 'on' else '0' }}"
          halftime: "{{ '1' if states('input_boolean.nabaztag_firmware_halftime') == 'on' else '0' }}"
          surprise: "{{ '1' if states('input_boolean.nabaztag_firmware_surprise') == 'on' else '0' }}"
          taichi: "{{ '1' if states('input_boolean.nabaztag_firmware_taichi') == 'on' else '0' }}"
