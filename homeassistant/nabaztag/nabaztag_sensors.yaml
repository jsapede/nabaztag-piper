# =========================
# Nabaztag - Sensors (modern syntax)
# =========================

command_line:
  - sensor:
      name: "Nabaztag Fast Status"
      unique_id: nabaztag_fast_status
      command: |
        python3 -c "
        import socket,re,time,sys
        try:
         s=socket.socket();s.settimeout(5)
         s.connect(('{{ states('input_text.nabaztag_ip_address') }}',23))
         s.send(b'sleeping? . cr autoclock-enabled @ . cr autohalftime-enabled @ . cr autosurprise-enabled @ . cr autotaichi-enabled @ . cr info-weather @ . cr info-traffic @ . cr info-pollution @ . cr quit\n')
         time.sleep(0.5)
         d=b''
         while 1:
          try:
           c=s.recv(4096)
           if not c:break
           d+=c
          except:break
         s.close()
         v=re.findall(rb'> (\d+)|(?<=\n)(\d+)(?=\n)',d)
         if v: print(','.join([(a or b).decode() for a,b in v[-8:]]))
         else: print('0,0,0,0,0,0,0,0')
        except:
         print('0,0,0,0,0,0,0,0')
        "
      scan_interval: 5
      command_timeout: 10
      value_template: "ok"
      json_attributes:
        - sleep_state
        - autoclock
        - autohalftime
        - autosurprise
        - autotaichi
        - weather
        - traffic
        - pollution

rest:
  - resource_template: "http://{{ states('input_text.nabaztag_ip_address') }}/status"
    method: GET
    scan_interval: 300
    timeout: 10
    sensor:
      - name: "Nabaztag Status"
        unique_id: nabaztag_status
        value_template: |
          {% if value_json.sleep_state is defined and value_json.sleep_state == 1 %}
            asleep
          {% else %}
            awake
          {% endif %}
        json_attributes:
          - language
          - wake_up
          - go_to_bed
          - taichi_freq
          - streaming_state
          - rev


# =========================
# Nabaztag - Template binary_sensors (état réel telnet)
# =========================

template:
  - binary_sensor:
      - name: "Horloge firmware (état réel)"
        unique_id: nabaztag_firmware_clock_binary
        state: >
          {{ state_attr('sensor.nabaztag_fast_status', 'autoclock') == '1' }}

      - name: "Demi-heure firmware (état réel)"
        unique_id: nabaztag_firmware_halftime_binary
        state: >
          {{ state_attr('sensor.nabaztag_fast_status', 'autohalftime') == '1' }}

      - name: "Surprise firmware (état réel)"
        unique_id: nabaztag_firmware_surprise_binary
        state: >
          {{ state_attr('sensor.nabaztag_fast_status', 'autosurprise') == '1' }}

      - name: "Taichi firmware (état réel)"
        unique_id: nabaztag_firmware_taichi_binary
        state: >
          {{ state_attr('sensor.nabaztag_fast_status', 'autotaichi') == '1' }}

      - name: "Nabaztag endormi (état réel)"
        unique_id: nabaztag_asleep_binary
        state: >
          {{ state_attr('sensor.nabaztag_fast_status', 'sleep_state') == '1' }}

      - name: "LED Météo (état réel)"
        unique_id: nabaztag_led_weather_binary
        state: >
          {{ state_attr('sensor.nabaztag_fast_status', 'weather') not in [None, '-1'] }}

      - name: "LED Trafic (état réel)"
        unique_id: nabaztag_led_traffic_binary
        state: >
          {{ state_attr('sensor.nabaztag_fast_status', 'traffic') not in [None, '-1'] }}

      - name: "LED Pollution (état réel)"
        unique_id: nabaztag_led_pollution_binary
        state: >
          {{ state_attr('sensor.nabaztag_fast_status', 'pollution') not in [None, '-1'] }}
