# =========================
# Nabaztag - REST Sensors
# =========================

sensor:

  # ========== FULL STATUS ==========
  # Récupère l'état complet du Nabaztag depuis /status

  - platform: rest
    name: "Nabaztag Status"
    unique_id: nabaztag_status
    resource_template: "http://{{ states('input_text.nabaztag_ip_address') }}/status"
    method: GET
    value_template: >
      {% if value_json.sleep_state is defined and value_json.sleep_state == 1 %}
        asleep
      {% else %}
        awake
      {% endif %}
    json_attributes:
      - language
      - wake_up
      - go_to_bed
      - taichi_freq
      - sleep_state
      - autoclock_enabled
      - autohalftime_enabled
      - autosurprise_enabled
      - autotaichi_enabled
      - streaming_state
      - rev
    scan_interval: 120
    timeout: 10


