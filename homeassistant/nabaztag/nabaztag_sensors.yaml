# =========================
# Nabaztag - Sensors
# =========================

sensor:

  # ========== FAST STATUS (Telnet, 1s) ==========
  # État réel des flags firmware et des services info via telnet
  # Format: sleep_state,autoclock,halftime,surprise,taichi,weather,traffic,pollution

  - platform: command_line
    name: "Nabaztag Fast Status"
    unique_id: nabaztag_fast_status
    command: >
      printf "\n sleeping? . cr autoclock-enabled @ . cr autohalftime-enabled @ . cr autosurprise-enabled @ . cr autotaichi-enabled @ . cr info-weather @ . cr info-traffic @ . cr info-pollution @ . cr quit\n" |
      nc -q 0 {{ states('input_text.nabaztag_ip_address') }} 23 2>/dev/null |
      sed 's/^\?$/-1/' | grep -oP '(?<=> )\d+$|^\d+$|^-1$' | tail -8 | paste -sd,
    scan_interval: 1
    timeout: 3
    value_template: "ok"
    json_attributes:
      - sleep_state
      - autoclock
      - autohalftime
      - autosurprise
      - autotaichi
      - weather
      - traffic
      - pollution

  # ========== FULL STATUS (HTTP, 5min) ==========
  # Données de configuration (changent rarement)

  - platform: rest
    name: "Nabaztag Status"
    unique_id: nabaztag_status
    resource_template: "http://{{ states('input_text.nabaztag_ip_address') }}/status"
    method: GET
    value_template: >
      {% if value_json.sleep_state is defined and value_json.sleep_state == 1 %}
        asleep
      {% else %}
        awake
      {% endif %}
    json_attributes:
      - language
      - wake_up
      - go_to_bed
      - taichi_freq
      - streaming_state
      - rev
    scan_interval: 300
    timeout: 10


# =========================
# Nabaztag - Binary Sensors (état réel depuis telnet)
# =========================

binary_sensor:

  - platform: template
    sensors:
      nabaztag_firmware_clock:
        friendly_name: "Horloge firmware (état réel)"
        value_template: >
          {% if state_attr('sensor.nabaztag_fast_status', 'autoclock') is defined
             and state_attr('sensor.nabaztag_fast_status', 'autoclock') == '1' %}
            on
          {% else %}
            off
          {% endif %}

      nabaztag_firmware_halftime:
        friendly_name: "Demi-heure firmware (état réel)"
        value_template: >
          {% if state_attr('sensor.nabaztag_fast_status', 'autohalftime') is defined
             and state_attr('sensor.nabaztag_fast_status', 'autohalftime') == '1' %}
            on
          {% else %}
            off
          {% endif %}

      nabaztag_firmware_surprise:
        friendly_name: "Surprise firmware (état réel)"
        value_template: >
          {% if state_attr('sensor.nabaztag_fast_status', 'autosurprise') is defined
             and state_attr('sensor.nabaztag_fast_status', 'autosurprise') == '1' %}
            on
          {% else %}
            off
          {% endif %}

      nabaztag_firmware_taichi:
        friendly_name: "Taichi firmware (état réel)"
        value_template: >
          {% if state_attr('sensor.nabaztag_fast_status', 'autotaichi') is defined
             and state_attr('sensor.nabaztag_fast_status', 'autotaichi') == '1' %}
            on
          {% else %}
            off
          {% endif %}

      nabaztag_asleep:
        friendly_name: "Nabaztag endormi (état réel)"
        value_template: >
          {% if state_attr('sensor.nabaztag_fast_status', 'sleep_state') is defined
             and state_attr('sensor.nabaztag_fast_status', 'sleep_state') == '1' %}
            on
          {% else %}
            off
          {% endif %}


# =========================
# Nabaztag - Switches firmware (état réel depuis telnet)
# =========================

switch:

  - platform: template
    switches:
      nabaztag_firmware_clock:
        friendly_name: "Horloge (heure pile)"
        value_template: "{{ state_attr('sensor.nabaztag_fast_status', 'autoclock') == '1' }}"
        turn_on:
          action: rest_command.nabaztag_autocontrol_clock
          data:
            clock: "1"
        turn_off:
          action: rest_command.nabaztag_autocontrol_clock
          data:
            clock: "0"

      nabaztag_firmware_halftime:
        friendly_name: "Demi-heure"
        value_template: "{{ state_attr('sensor.nabaztag_fast_status', 'autohalftime') == '1' }}"
        turn_on:
          action: rest_command.nabaztag_autocontrol_halftime
          data:
            halftime: "1"
        turn_off:
          action: rest_command.nabaztag_autocontrol_halftime
          data:
            halftime: "0"

      nabaztag_firmware_surprise:
        friendly_name: "Surprise"
        value_template: "{{ state_attr('sensor.nabaztag_fast_status', 'autosurprise') == '1' }}"
        turn_on:
          action: rest_command.nabaztag_autocontrol_surprise
          data:
            surprise: "1"
        turn_off:
          action: rest_command.nabaztag_autocontrol_surprise
          data:
            surprise: "0"

      nabaztag_firmware_taichi:
        friendly_name: "Taichi"
        value_template: "{{ state_attr('sensor.nabaztag_fast_status', 'autotaichi') == '1' }}"
        turn_on:
          action: rest_command.nabaztag_autocontrol_taichi
          data:
            taichi: "1"
        turn_off:
          action: rest_command.nabaztag_autocontrol_taichi
          data:
            taichi: "0"


# =========================
# Nabaztag - Switches LEDs (état réel depuis telnet)
# =========================

  - platform: template
    switches:
      nabaztag_led_weather:
        friendly_name: "LED Météo"
        value_template: "{{ state_attr('sensor.nabaztag_fast_status', 'weather') not in [None, '-1'] }}"
        turn_on:
          action: rest_command.nabaztag_weather
          data:
            weather: "{{ states('input_number.nabaztag_weather') | int }}"
        turn_off:
          action: rest_command.nabaztag_clear

      nabaztag_led_traffic:
        friendly_name: "LED Trafic"
        value_template: "{{ state_attr('sensor.nabaztag_fast_status', 'traffic') not in [None, '-1'] }}"
        turn_on:
          action: rest_command.nabaztag_traffic
          data:
            traffic: "{{ states('input_number.nabaztag_traffic') | int }}"
        turn_off:
          action: rest_command.nabaztag_clear

      nabaztag_led_pollution:
        friendly_name: "LED Pollution"
        value_template: "{{ state_attr('sensor.nabaztag_fast_status', 'pollution') not in [None, '-1'] }}"
        turn_on:
          action: rest_command.nabaztag_pollution
          data:
            pollution: "{{ states('input_number.nabaztag_pollution') | int }}"
        turn_off:
          action: rest_command.nabaztag_clear
