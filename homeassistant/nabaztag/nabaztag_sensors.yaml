# =========================
# Nabaztag - REST Sensor (backup, poll toutes les 5 min)
# =========================

rest:
  - resource_template: "http://{{ states('input_text.nabaztag_ip_address') }}/status"
    method: GET
    scan_interval: 300
    timeout: 10
    sensor:
      - name: "Nabaztag Status"
        unique_id: nabaztag_status
        value_template: |
          {% if value_json.sleep_state is defined and value_json.sleep_state == 1 %}
            asleep
          {% else %}
            awake
          {% endif %}
        json_attributes:
          - sleep_state
          - autoclock_enabled
          - autohalftime_enabled
          - autosurprise_enabled
          - autotaichi_enabled
          - language
          - wake_up
          - go_to_bed
          - taichi_freq
          - streaming_state
          - rev
          - info_weather
          - info_traffic
          - info_pollution


# =========================
# Nabaztag - Template binary_sensors (état réel)
# =========================

template:
  - sensor:
      - name: "Météo niveau"
        unique_id: nabaztag_weather_level
        state: >
          {% set w = states('weather.soucieu_en_jarrest') %}
          {% if w == 'unavailable' %}unavailable
          {% elif w == 'sunny' or w == 'clear' %}0
          {% elif w == 'partlycloudy' or w == 'cloudy' %}1
          {% elif w == 'fog' %}2
          {% elif w == 'rainy' or w == 'pouring' %}3
          {% elif w == 'snowy' or w == 'snowy-rainy' or w == 'hail' %}4
          {% elif w == 'lightning' or w == 'lightning-rainy' or w == 'exceptional' %}5
          {% else %}unavailable
          {% endif %}
      - name: "Pollution niveau"
        unique_id: nabaztag_pollution_level
        state: >
          {% set v = states('sensor.bd_pierre_philippe_reydellet_indice_de_qualite_de_l_air') | int(-1) %}
          {% if v < 0 %}unavailable
          {% elif v > 500 %}10
          {% else %}{{ (v * 10 / 500) | round(0, 'floor') | int }}
          {% endif %}
  - binary_sensor:
      - name: "Horloge firmware (état réel)"
        unique_id: nabaztag_firmware_clock_binary
        state: >
          {{ state_attr('sensor.nabaztag_telnet_status', 'autoclock') == 1 }}
      - name: "Demi-heure firmware (état réel)"
        unique_id: nabaztag_firmware_halftime_binary
        state: >
          {{ state_attr('sensor.nabaztag_telnet_status', 'autohalftime') == 1 }}
      - name: "Surprise firmware (état réel)"
        unique_id: nabaztag_firmware_surprise_binary
        state: >
          {{ state_attr('sensor.nabaztag_telnet_status', 'autosurprise') == 1 }}
      - name: "Taichi firmware (état réel)"
        unique_id: nabaztag_firmware_taichi_binary
        state: >
          {{ state_attr('sensor.nabaztag_telnet_status', 'autotaichi') == 1 }}
      - name: "Nabaztag endormi (état réel)"
        unique_id: nabaztag_asleep_binary
        state: >
          {{ state_attr('sensor.nabaztag_telnet_status', 'sleep_state') == 1 }}
      - name: "LED Météo (état réel)"
        unique_id: nabaztag_led_weather_binary
        state: >
          {{ state_attr('sensor.nabaztag_telnet_status', 'weather') not in [None, -1] }}
      - name: "LED Trafic (état réel)"
        unique_id: nabaztag_led_traffic_binary
        state: >
          {{ state_attr('sensor.nabaztag_telnet_status', 'traffic') not in [None, -1] }}
      - name: "LED Pollution (état réel)"
        unique_id: nabaztag_led_pollution_binary
        state: >
          {{ state_attr('sensor.nabaztag_telnet_status', 'pollution') not in [None, -1] }}
      - name: "Nabaztag rebooted"
        unique_id: nabaztag_rebooted
        state: >
          {{ state_attr('sensor.nabaztag_telnet_status', 'uptime') is not none 
             and state_attr('sensor.nabaztag_telnet_status', 'uptime') | int(9999) < 120 }}
      - name: "Configuration firmware synchronisée"
        unique_id: nabaztag_config_sync
        state: >
          {% set c = states('input_boolean.nabaztag_firmware_clock') == 'on' %}
          {% set h = states('input_boolean.nabaztag_firmware_halftime') == 'on' %}
          {% set s = states('input_boolean.nabaztag_firmware_surprise') == 'on' %}
          {% set t = states('input_boolean.nabaztag_firmware_taichi') == 'on' %}
          {% set w = states('input_boolean.nabaztag_weather_enabled') == 'on' %}
          {% set tr = states('input_boolean.nabaztag_traffic_enabled') == 'on' %}
          {% set p = states('input_boolean.nabaztag_pollution_enabled') == 'on' %}
          {% set ac = state_attr('sensor.nabaztag_telnet_status', 'autoclock') == 1 %}
          {% set ah = state_attr('sensor.nabaztag_telnet_status', 'autohalftime') == 1 %}
          {% set asu = state_attr('sensor.nabaztag_telnet_status', 'autosurprise') == 1 %}
          {% set at = state_attr('sensor.nabaztag_telnet_status', 'autotaichi') == 1 %}
          {% set mw = state_attr('sensor.nabaztag_telnet_status', 'weather') not in [None, -1] %}
          {% set mtr = state_attr('sensor.nabaztag_telnet_status', 'traffic') not in [None, -1] %}
          {% set mp = state_attr('sensor.nabaztag_telnet_status', 'pollution') not in [None, -1] %}
          {{ c == ac and h == ah and s == asu and t == at and w == mw and tr == mtr and p == mp }}
      - name: "Configuration firmware désynchronisée"
        unique_id: nabaztag_config_desync
        state: >
          {{ is_state('binary_sensor.configuration_firmware_synchronisee', 'off') }}
        delay_on:
          minutes: 2
