# =========================
# Nabaztag - REST Sensor (backup, poll toutes les 5 min)
# =========================

rest:
  - resource_template: "http://{{ states('input_text.nabaztag_ip_address') }}/status"
    method: GET
    scan_interval: 300
    timeout: 10
    sensor:
      - name: "Nabaztag Status"
        unique_id: nabaztag_status
        value_template: |
          {% if value_json.sleep_state is defined and value_json.sleep_state == 1 %}
            asleep
          {% else %}
            awake
          {% endif %}
        json_attributes:
          - sleep_state
          - autoclock_enabled
          - autohalftime_enabled
          - autosurprise_enabled
          - autotaichi_enabled
          - language
          - wake_up
          - go_to_bed
          - taichi_freq
          - streaming_state
          - rev
          - info_weather
          - info_traffic
          - info_pollution
