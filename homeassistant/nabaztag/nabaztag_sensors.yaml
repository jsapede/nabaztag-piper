# =========================
# Nabaztag - Sensors
# =========================

sensor:

  # ========== FAST STATUS (Telnet, 1s) ==========
  # État réel des flags firmware et des services info via telnet
  # Format: sleep_state,autoclock,halftime,surprise,taichi,weather,traffic,pollution

  - platform: command_line
    name: "Nabaztag Fast Status"
    unique_id: nabaztag_fast_status
    command: >
      python3 -c "
      import socket,re,time
      s=socket.socket();s.settimeout(3)
      s.connect(('{{ states('input_text.nabaztag_ip_address') }}',23))
      s.send(b'sleeping? . cr autoclock-enabled @ . cr autohalftime-enabled @ . cr autosurprise-enabled @ . cr autotaichi-enabled @ . cr info-weather @ . cr info-traffic @ . cr info-pollution @ . cr quit\n')
      time.sleep(0.3)
      d=b''
      while 1:
       try:
        c=s.recv(4096)
        if not c:break
        d+=c
       except:break
      s.close()
      v=re.findall(rb'> (\d+)|(?<=\n)(\d+)(?=\n)',d)
      print(','.join([(a or b).decode() for a,b in v[-8:]]))
      " 2>/dev/null
    scan_interval: 1
    timeout: 3
    value_template: "ok"
    json_attributes:
      - sleep_state
      - autoclock
      - autohalftime
      - autosurprise
      - autotaichi
      - weather
      - traffic
      - pollution

  # ========== FULL STATUS (HTTP, 5min) ==========
  # Données de configuration (changent rarement)

  - platform: rest
    name: "Nabaztag Status"
    unique_id: nabaztag_status
    resource_template: "http://{{ states('input_text.nabaztag_ip_address') }}/status"
    method: GET
    value_template: >
      {% if value_json.sleep_state is defined and value_json.sleep_state == 1 %}
        asleep
      {% else %}
        awake
      {% endif %}
    json_attributes:
      - language
      - wake_up
      - go_to_bed
      - taichi_freq
      - streaming_state
      - rev
    scan_interval: 300
    timeout: 10


# =========================
# Nabaztag - Template (binary_sensor + switches, modern syntax)
# =========================
# État réel via telnet toutes les 1s, non-optimiste.

template:
  - binary_sensor:
      - name: "Horloge firmware (état réel)"
        unique_id: nabaztag_firmware_clock_binary
        state: >
          {{ state_attr('sensor.nabaztag_fast_status', 'autoclock') == '1' }}

      - name: "Demi-heure firmware (état réel)"
        unique_id: nabaztag_firmware_halftime_binary
        state: >
          {{ state_attr('sensor.nabaztag_fast_status', 'autohalftime') == '1' }}

      - name: "Surprise firmware (état réel)"
        unique_id: nabaztag_firmware_surprise_binary
        state: >
          {{ state_attr('sensor.nabaztag_fast_status', 'autosurprise') == '1' }}

      - name: "Taichi firmware (état réel)"
        unique_id: nabaztag_firmware_taichi_binary
        state: >
          {{ state_attr('sensor.nabaztag_fast_status', 'autotaichi') == '1' }}

      - name: "Nabaztag endormi (état réel)"
        unique_id: nabaztag_asleep_binary
        state: >
          {{ state_attr('sensor.nabaztag_fast_status', 'sleep_state') == '1' }}

  - switch:
      - name: "Horloge (heure pile)"
        unique_id: nabaztag_firmware_clock
        state: "{{ state_attr('sensor.nabaztag_fast_status', 'autoclock') == '1' }}"
        turn_on:
          - action: shell_command.nabaztag_telnet_clock
            data:
              clock: "1"
        turn_off:
          - action: shell_command.nabaztag_telnet_clock
            data:
              clock: "0"

      - name: "Demi-heure"
        unique_id: nabaztag_firmware_halftime
        state: "{{ state_attr('sensor.nabaztag_fast_status', 'autohalftime') == '1' }}"
        turn_on:
          - action: shell_command.nabaztag_telnet_halftime
            data:
              halftime: "1"
        turn_off:
          - action: shell_command.nabaztag_telnet_halftime
            data:
              halftime: "0"

      - name: "Surprise"
        unique_id: nabaztag_firmware_surprise
        state: "{{ state_attr('sensor.nabaztag_fast_status', 'autosurprise') == '1' }}"
        turn_on:
          - action: shell_command.nabaztag_telnet_surprise_flag
            data:
              surprise: "1"
        turn_off:
          - action: shell_command.nabaztag_telnet_surprise_flag
            data:
              surprise: "0"

      - name: "Taichi"
        unique_id: nabaztag_firmware_taichi
        state: "{{ state_attr('sensor.nabaztag_fast_status', 'autotaichi') == '1' }}"
        turn_on:
          - action: shell_command.nabaztag_telnet_taichi_flag
            data:
              taichi: "1"
        turn_off:
          - action: shell_command.nabaztag_telnet_taichi_flag
            data:
              taichi: "0"

      - name: "LED Météo"
        unique_id: nabaztag_led_weather
        state: "{{ state_attr('sensor.nabaztag_fast_status', 'weather') not in [None, '-1'] }}"
        turn_on:
          - action: shell_command.nabaztag_telnet_weather
        turn_off:
          - action: shell_command.nabaztag_telnet_clear

      - name: "LED Trafic"
        unique_id: nabaztag_led_traffic
        state: "{{ state_attr('sensor.nabaztag_fast_status', 'traffic') not in [None, '-1'] }}"
        turn_on:
          - action: shell_command.nabaztag_telnet_traffic
        turn_off:
          - action: shell_command.nabaztag_telnet_clear

      - name: "LED Pollution"
        unique_id: nabaztag_led_pollution
        state: "{{ state_attr('sensor.nabaztag_fast_status', 'pollution') not in [None, '-1'] }}"
        turn_on:
          - action: shell_command.nabaztag_telnet_pollution
        turn_off:
          - action: shell_command.nabaztag_telnet_clear
