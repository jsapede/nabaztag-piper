# =========================
# Nabaztag - Scripts
# =========================

script:

  # ========== RESTORE LEDs ==========
  # Restaure toutes les LEDs enabled après reconnexion

  nabaztag_restore_leds:
    alias: "Nabaztag - Restore LEDs"
    description: "Restaure toutes les LEDs enabled via switches"
    sequence:
      - if:
          - condition: state
            entity_id: switch.nabaztag_weather
            state: "on"
        then:
          - action: shell_command.nabaztag_telnet_weather
      - if:
          - condition: state
            entity_id: switch.nabaztag_traffic
            state: "on"
        then:
          - action: shell_command.nabaztag_telnet_traffic
      - if:
          - condition: state
            entity_id: switch.nabaztag_pollution
            state: "on"
        then:
          - action: shell_command.nabaztag_telnet_pollution
      - if:
          - condition: state
            entity_id: switch.nabaztag_nose
            state: "on"
        then:
          - action: rest_command.nabaztag_nose
            data:
              state: "{{ states('input_number.nabaztag_nose_state') | int }}"

  # ========== TOGGLES ==========
  # Supprimés — remplacés par command_line switches (nabaztag_switches.yaml)

  # ========== PAROLE ==========

  nabaztag_talk:
    alias: "Nabaztag - Parler"
    description: "Fait dire un message au Nabaztag"
    sequence:
      - action: rest_command.nabaztag_say
        data:
          message: "{{ states('input_text.nabaztag_message') }}"

  # ========== OREILLES ==========

  nabaztag_move_left_ear:
    alias: "Nabaztag - Oreille gauche"
    description: "Bouge oreille gauche à position définie"
    sequence:
      - action: shell_command.nabaztag_telnet_left_ear
        data:
          position: "{{ states('input_select.nabaztag_ear_position') }}"

  nabaztag_move_right_ear:
    alias: "Nabaztag - Oreille droite"
    description: "Bouge oreille droite à position définie"
    sequence:
      - action: shell_command.nabaztag_telnet_right_ear
        data:
          position: "{{ states('input_select.nabaztag_ear_position') }}"

  nabaztag_move_both_ears:
    alias: "Nabaztag - Les deux oreilles"
    description: "Bouge les deux oreilles successivement"
    sequence:
      - action: shell_command.nabaztag_telnet_left_ear
        data:
          position: "{{ states('input_select.nabaztag_ear_position') }}"
      - delay: "00:00:01"
      - action: shell_command.nabaztag_telnet_right_ear
        data:
          position: "{{ states('input_select.nabaztag_ear_position') }}"

  # ========== CONFIGURATION ==========

  nabaztag_apply_setup:
    alias: "Nabaztag - Appliquer Setup"
    description: "Envoie configuration complète (coordonnées, timezone, heures)"
    sequence:
      - action: rest_command.nabaztag_setup

  # ========== TAICHI ==========

  nabaztag_taichi:
    alias: "Nabaztag - Taichi"
    description: "Déclenche le Taichi avec une intensité 0-255 (0=stop, 255=max)"
    fields:
      intensity:
        name: Intensité
        description: "Niveau d'intensité (0=stop, 40=min, 80=moyen, 255=max, 1000=répété)"
        selector:
          number:
            min: 0
            max: 1000
            step: 1
    sequence:
      - action: shell_command.nabaztag_telnet_taichi
        data:
          intensity: "{{ intensity }}"


