# =========================
# Nabaztag - Scripts
# =========================
#
# Tous les appels REST utilisent les 2 commands generiques:
# - rest_command.nabaztag_api (endpoint + query)
# - rest_command.nabaztag_autocontrol (c/h/s/t)

script:

  # ========== RESTORE LEDs ==========

  nabaztag_restore_leds:
    alias: "Nabaztag - Restore LEDs"
    description: "Restaure toutes les LEDs enabled"
    sequence:
      - if:
          - condition: state
            entity_id: input_boolean.nabaztag_weather_enabled
            state: "on"
        then:
          - action: rest_command.nabaztag_api
            data:
              endpoint: weather
              query: "v={{ states('input_number.nabaztag_weather') | int }}"
      - if:
          - condition: state
            entity_id: input_boolean.nabaztag_traffic_enabled
            state: "on"
        then:
          - action: rest_command.nabaztag_api
            data:
              endpoint: traffic
              query: "v={{ states('input_number.nabaztag_traffic') | int }}"
      - if:
          - condition: state
            entity_id: input_boolean.nabaztag_pollution_enabled
            state: "on"
        then:
          - action: rest_command.nabaztag_api
            data:
              endpoint: pollution
              query: "v={{ states('input_number.nabaztag_pollution') | int }}"
      - if:
          - condition: state
            entity_id: input_boolean.nabaztag_nose_enabled
            state: "on"
        then:
          - action: rest_command.nabaztag_api
            data:
              endpoint: nose
              query: "v={{ states('input_number.nabaztag_nose_state') | int }}"

  # ========== TOGGLE WEATHER ==========

  nabaztag_toggle_weather:
    alias: "Nabaztag - Toggle Weather"
    description: "Enable/disable LED meteo"
    sequence:
      - if:
          - condition: state
            entity_id: input_boolean.nabaztag_weather_enabled
            state: "on"
        then:
          - action: rest_command.nabaztag_api
            data:
              endpoint: weather
              query: "v={{ states('input_number.nabaztag_weather') | int }}"
        else:
          - action: rest_command.nabaztag_api
            data: { endpoint: clear }
          - delay: "00:00:01"
          - if:
              - condition: state
                entity_id: input_boolean.nabaztag_traffic_enabled
                state: "on"
            then:
              - action: rest_command.nabaztag_api
                data:
                  endpoint: traffic
                  query: "v={{ states('input_number.nabaztag_traffic') | int }}"
          - if:
              - condition: state
                entity_id: input_boolean.nabaztag_pollution_enabled
                state: "on"
            then:
              - action: rest_command.nabaztag_api
                data:
                  endpoint: pollution
                  query: "v={{ states('input_number.nabaztag_pollution') | int }}"
          - if:
              - condition: state
                entity_id: input_boolean.nabaztag_nose_enabled
                state: "on"
            then:
              - action: rest_command.nabaztag_api
                data:
                  endpoint: nose
                  query: "v={{ states('input_number.nabaztag_nose_state') | int }}"

  # ========== TOGGLE TRAFFIC ==========

  nabaztag_toggle_traffic:
    alias: "Nabaztag - Toggle Traffic"
    description: "Enable/disable LED traffic"
    sequence:
      - if:
          - condition: state
            entity_id: input_boolean.nabaztag_traffic_enabled
            state: "on"
        then:
          - action: rest_command.nabaztag_api
            data:
              endpoint: traffic
              query: "v={{ states('input_number.nabaztag_traffic') | int }}"
        else:
          - action: rest_command.nabaztag_api
            data: { endpoint: clear }
          - delay: "00:00:01"
          - if:
              - condition: state
                entity_id: input_boolean.nabaztag_weather_enabled
                state: "on"
            then:
              - action: rest_command.nabaztag_api
                data:
                  endpoint: weather
                  query: "v={{ states('input_number.nabaztag_weather') | int }}"
          - if:
              - condition: state
                entity_id: input_boolean.nabaztag_pollution_enabled
                state: "on"
            then:
              - action: rest_command.nabaztag_api
                data:
                  endpoint: pollution
                  query: "v={{ states('input_number.nabaztag_pollution') | int }}"
          - if:
              - condition: state
                entity_id: input_boolean.nabaztag_nose_enabled
                state: "on"
            then:
              - action: rest_command.nabaztag_api
                data:
                  endpoint: nose
                  query: "v={{ states('input_number.nabaztag_nose_state') | int }}"

  # ========== TOGGLE POLLUTION ==========

  nabaztag_toggle_pollution:
    alias: "Nabaztag - Toggle Pollution"
    description: "Enable/disable LED pollution"
    sequence:
      - if:
          - condition: state
            entity_id: input_boolean.nabaztag_pollution_enabled
            state: "on"
        then:
          - action: rest_command.nabaztag_api
            data:
              endpoint: pollution
              query: "v={{ states('input_number.nabaztag_pollution') | int }}"
        else:
          - action: rest_command.nabaztag_api
            data: { endpoint: clear }
          - delay: "00:00:01"
          - if:
              - condition: state
                entity_id: input_boolean.nabaztag_weather_enabled
                state: "on"
            then:
              - action: rest_command.nabaztag_api
                data:
                  endpoint: weather
                  query: "v={{ states('input_number.nabaztag_weather') | int }}"
          - if:
              - condition: state
                entity_id: input_boolean.nabaztag_traffic_enabled
                state: "on"
            then:
              - action: rest_command.nabaztag_api
                data:
                  endpoint: traffic
                  query: "v={{ states('input_number.nabaztag_traffic') | int }}"
          - if:
              - condition: state
                entity_id: input_boolean.nabaztag_nose_enabled
                state: "on"
            then:
              - action: rest_command.nabaztag_api
                data:
                  endpoint: nose
                  query: "v={{ states('input_number.nabaztag_nose_state') | int }}"

  # ========== TOGGLE NOSE ==========

  nabaztag_toggle_nose:
    alias: "Nabaztag - Toggle Nose"
    description: "Enable/disable nez"
    sequence:
      - if:
          - condition: state
            entity_id: input_boolean.nabaztag_nose_enabled
            state: "on"
        then:
          - action: rest_command.nabaztag_api
            data:
              endpoint: nose
              query: "v={{ states('input_number.nabaztag_nose_state') | int }}"
        else:
          - action: rest_command.nabaztag_api
            data:
              endpoint: nose
              query: "v=0"

  # ========== PAROLE ==========

  nabaztag_talk:
    alias: "Nabaztag - Parler"
    description: "Fait dire un message au Nabaztag"
    sequence:
      - action: rest_command.nabaztag_api
        data:
          endpoint: say
          query: "t={{ states('input_text.nabaztag_message') | urlencode }}"

  # ========== OREILLES ==========

  nabaztag_move_left_ear:
    alias: "Nabaztag - Oreille gauche"
    description: "Bouge oreille gauche a position definie"
    sequence:
      - action: rest_command.nabaztag_api
        data:
          endpoint: left
          query: "p={{ states('input_select.nabaztag_ear_position') }}&d=0"

  nabaztag_move_right_ear:
    alias: "Nabaztag - Oreille droite"
    description: "Bouge oreille droite a position definie"
    sequence:
      - action: rest_command.nabaztag_api
        data:
          endpoint: right
          query: "p={{ states('input_select.nabaztag_ear_position') }}&d=0"

  nabaztag_move_both_ears:
    alias: "Nabaztag - Les deux oreilles"
    description: "Bouge les deux oreilles successivement"
    sequence:
      - action: rest_command.nabaztag_api
        data:
          endpoint: left
          query: "p={{ states('input_select.nabaztag_ear_position') }}&d=0"
      - delay: "00:00:01"
      - action: rest_command.nabaztag_api
        data:
          endpoint: right
          query: "p={{ states('input_select.nabaztag_ear_position') }}&d=0"

  # ========== CONFIGURATION ==========

  nabaztag_apply_setup:
    alias: "Nabaztag - Appliquer Setup"
    description: "Envoie configuration complete (coordonnees, timezone, heures)"
    sequence:
      - action: rest_command.nabaztag_api
        data:
          endpoint: setup
          query: "j={{ state_attr('zone.home', 'latitude') | round(3) }}&k={{ state_attr('zone.home', 'longitude') | round(3) }}&l={{ states('input_select.nabaztag_language') }}&c={{ {'Europe/Paris': 'PAR', 'Europe/London': 'LON', 'America/New_York': 'NYC', 'Asia/Tokyo': 'TYO'}[states('input_select.nabaztag_timezone_city')]|default('PAR') }}&d={{ 1 if is_state('input_boolean.nabaztag_daylight_saving', 'on') else 0 }}&w={{ states('input_number.nabaztag_wake_hour') | int }}&b={{ states('input_number.nabaztag_sleep_hour') | int }}&t={{ states('input_number.nabaztag_taichi_freq') | int }}"

  # ========== NABAZTAG LIFE ==========

  nabaztag_generate_random_action_times:
    alias: "Generer heures actions aleatoires"
    description: "Genere 2 heures aleatoires (9h-22h) pour Nabaztag Life"
    sequence:
      - variables:
          h1: "{{ range(9, 22) | random }}"
          m1: "{{ range(0, 60) | random }}"
      - action: input_datetime.set_datetime
        target:
          entity_id: input_datetime.nabaztag_random_action_time_1
        data:
          time: "{{ '%02d:%02d:00' | format(h1, m1) }}"
      - variables:
          h2: "{{ range(9, 22) | random }}"
          m2: "{{ range(0, 60) | random }}"
      - action: input_datetime.set_datetime
        target:
          entity_id: input_datetime.nabaztag_random_action_time_2
        data:
          time: "{{ '%02d:%02d:00' | format(h2, m2) }}"
