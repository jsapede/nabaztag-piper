# =========================
# Nabaztag - Scripts
# =========================

script:

  # ========== RESTORE LEDs ==========
  # Restaure toutes les LEDs enabled après reconnexion

  nabaztag_restore_leds:
    alias: "Nabaztag - Restore LEDs"
    description: "Restaure toutes les LEDs enabled"
    sequence:
      - if:
          - condition: state
            entity_id: input_boolean.nabaztag_weather_enabled
            state: "on"
        then:
          - action: shell_command.nabaztag_telnet_weather
            data:
              weather: "{{ states('input_number.nabaztag_weather') | int }}"
      - if:
          - condition: state
            entity_id: input_boolean.nabaztag_traffic_enabled
            state: "on"
        then:
          - action: shell_command.nabaztag_telnet_traffic
            data:
              traffic: "{{ states('input_number.nabaztag_traffic') | int }}"
      - if:
          - condition: state
            entity_id: input_boolean.nabaztag_pollution_enabled
            state: "on"
        then:
          - action: shell_command.nabaztag_telnet_pollution
            data:
              pollution: "{{ states('input_number.nabaztag_pollution') | int }}"
      - if:
          - condition: state
            entity_id: input_boolean.nabaztag_nose_enabled
            state: "on"
        then:
          - action: rest_command.nabaztag_nose
            data:
              state: "{{ states('input_number.nabaztag_nose_state') | int }}"

  # ========== TOGGLE WEATHER ==========

  nabaztag_toggle_weather:
    alias: "Nabaztag - Toggle Weather"
    description: "Enable/disable LED météo"
    sequence:
      - if:
          - condition: state
            entity_id: input_boolean.nabaztag_weather_enabled
            state: "on"
        then:
          - action: shell_command.nabaztag_telnet_weather
        else:
          - action: shell_command.nabaztag_telnet_clear
          - delay: "00:00:01"
          - if:
              - condition: state
                entity_id: input_boolean.nabaztag_traffic_enabled
                state: "on"
            then:
              - action: shell_command.nabaztag_telnet_traffic
          - if:
              - condition: state
                entity_id: input_boolean.nabaztag_pollution_enabled
                state: "on"
            then:
              - action: shell_command.nabaztag_telnet_pollution
          - if:
              - condition: state
                entity_id: input_boolean.nabaztag_nose_enabled
                state: "on"
            then:
              - action: rest_command.nabaztag_nose
                data:
                  state: "{{ states('input_number.nabaztag_nose_state') | int }}"

  # ========== TOGGLE TRAFFIC ==========

  nabaztag_toggle_traffic:
    alias: "Nabaztag - Toggle Traffic"
    description: "Enable/disable LED traffic"
    sequence:
      - if:
          - condition: state
            entity_id: input_boolean.nabaztag_traffic_enabled
            state: "on"
        then:
          - action: shell_command.nabaztag_telnet_traffic
            data:
              traffic: "{{ states('input_number.nabaztag_traffic') | int }}"
        else:
          - action: shell_command.nabaztag_telnet_clear
          - delay: "00:00:01"
          - if:
              - condition: state
                entity_id: input_boolean.nabaztag_weather_enabled
                state: "on"
            then:
              - action: shell_command.nabaztag_telnet_weather
                data:
                  weather: "{{ states('input_number.nabaztag_weather') | int }}"
          - if:
              - condition: state
                entity_id: input_boolean.nabaztag_pollution_enabled
                state: "on"
            then:
              - action: shell_command.nabaztag_telnet_pollution
                data:
                  pollution: "{{ states('input_number.nabaztag_pollution') | int }}"
          - if:
              - condition: state
                entity_id: input_boolean.nabaztag_nose_enabled
                state: "on"
            then:
              - action: rest_command.nabaztag_nose
                data:
                  state: "{{ states('input_number.nabaztag_nose_state') | int }}"

  # ========== TOGGLE POLLUTION ==========

  nabaztag_toggle_pollution:
    alias: "Nabaztag - Toggle Pollution"
    description: "Enable/disable LED pollution"
    sequence:
      - if:
          - condition: state
            entity_id: input_boolean.nabaztag_pollution_enabled
            state: "on"
        then:
          - action: shell_command.nabaztag_telnet_pollution
            data:
              pollution: "{{ states('input_number.nabaztag_pollution') | int }}"
        else:
          - action: shell_command.nabaztag_telnet_clear
          - delay: "00:00:01"
          - if:
              - condition: state
                entity_id: input_boolean.nabaztag_weather_enabled
                state: "on"
            then:
              - action: shell_command.nabaztag_telnet_weather
                data:
                  weather: "{{ states('input_number.nabaztag_weather') | int }}"
          - if:
              - condition: state
                entity_id: input_boolean.nabaztag_traffic_enabled
                state: "on"
            then:
              - action: shell_command.nabaztag_telnet_traffic
                data:
                  traffic: "{{ states('input_number.nabaztag_traffic') | int }}"
          - if:
              - condition: state
                entity_id: input_boolean.nabaztag_nose_enabled
                state: "on"
            then:
              - action: rest_command.nabaztag_nose
                data:
                  state: "{{ states('input_number.nabaztag_nose_state') | int }}"

  # ========== TOGGLE NOSE ==========

  nabaztag_toggle_nose:
    alias: "Nabaztag - Toggle Nose"
    description: "Enable/disable nez"
    sequence:
      - if:
          - condition: state
            entity_id: input_boolean.nabaztag_nose_enabled
            state: "on"
        then:
          - action: rest_command.nabaztag_nose
            data:
              state: "{{ states('input_number.nabaztag_nose_state') | int }}"
        else:
          - action: rest_command.nabaztag_nose
            data:
              state: "0"

  # ========== PAROLE ==========

  nabaztag_talk:
    alias: "Nabaztag - Parler"
    description: "Fait dire un message au Nabaztag"
    sequence:
      - action: rest_command.nabaztag_say
        data:
          message: "{{ states('input_text.nabaztag_message') }}"

  # ========== OREILLES ==========

  nabaztag_move_left_ear:
    alias: "Nabaztag - Oreille gauche"
    description: "Bouge oreille gauche à position définie"
    sequence:
      - action: shell_command.nabaztag_telnet_left_ear
        data:
          position: "{{ states('input_select.nabaztag_ear_position') }}"

  nabaztag_move_right_ear:
    alias: "Nabaztag - Oreille droite"
    description: "Bouge oreille droite à position définie"
    sequence:
      - action: shell_command.nabaztag_telnet_right_ear
        data:
          position: "{{ states('input_select.nabaztag_ear_position') }}"

  nabaztag_move_both_ears:
    alias: "Nabaztag - Les deux oreilles"
    description: "Bouge les deux oreilles successivement"
    sequence:
      - action: shell_command.nabaztag_telnet_left_ear
        data:
          position: "{{ states('input_select.nabaztag_ear_position') }}"
      - delay: "00:00:01"
      - action: shell_command.nabaztag_telnet_right_ear
        data:
          position: "{{ states('input_select.nabaztag_ear_position') }}"

  # ========== CONFIGURATION ==========

  nabaztag_apply_setup:
    alias: "Nabaztag - Appliquer Setup"
    description: "Envoie configuration complète (coordonnées, timezone, heures)"
    sequence:
      - action: rest_command.nabaztag_setup

  # ========== TAICHI ==========

  nabaztag_taichi:
    alias: "Nabaztag - Taichi"
    description: "Déclenche le Taichi avec une intensité 0-255 (0=stop, 255=max)"
    fields:
      intensity:
        name: Intensité
        description: "Niveau d'intensité (0=stop, 40=min, 80=moyen, 255=max, 1000=répété)"
        selector:
          number:
            min: 0
            max: 1000
            step: 1
    sequence:
      - action: shell_command.nabaztag_telnet_taichi
        data:
          level: "{{ intensity }}"

  # ========== NABAZTAG LIFE ==========

  nabaztag_generate_random_action_times:
    alias: "Générer heures actions aléatoires"
    description: "Génère 2 heures aléatoires (9h-22h) pour Nabaztag Life"
    sequence:
      - variables:
          h1: "{{ range(9, 22) | random }}"
          m1: "{{ range(0, 60) | random }}"
      - action: input_datetime.set_datetime
        target:
          entity_id: input_datetime.nabaztag_random_action_time_1
        data:
          time: "{{ '%02d:%02d:00' | format(h1, m1) }}"
      - variables:
          h2: "{{ range(9, 22) | random }}"
          m2: "{{ range(0, 60) | random }}"
      - action: input_datetime.set_datetime
        target:
          entity_id: input_datetime.nabaztag_random_action_time_2
        data:
          time: "{{ '%02d:%02d:00' | format(h2, m2) }}"
