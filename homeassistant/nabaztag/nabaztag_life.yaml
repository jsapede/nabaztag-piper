# ==========================================
# NABAZTAG LIFE
# Scripts et automatisations pour un Nabaztag vivant
# ==========================================

# ==========================================
# SCRIPTS NABAZTAG LIFE
# ==========================================

script:
  # Action aléatoire
  nabaztag_random_action:
    alias: "Nabaztag - Action aléatoire"
    sequence:
      - variables:
          action_type: "{{ range(1, 11) | random }}"
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ action_type == 1 }}"
            sequence:
              - action: script.nabaztag_tell_joke
          - conditions:
              - condition: template
                value_template: "{{ action_type == 2 }}"
            sequence:
              - action: script.nabaztag_say_weather
          - conditions:
              - condition: template
                value_template: "{{ action_type == 3 }}"
            sequence:
              - action: script.nabaztag_say_traffic
          - conditions:
              - condition: template
                value_template: "{{ action_type == 4 }}"
            sequence:
              - action: script.nabaztag_say_pollution
          - conditions:
              - condition: template
                value_template: "{{ action_type == 5 }}"
            sequence:
              - action: script.nabaztag_announce_time
          - conditions:
              - condition: template
                value_template: "{{ action_type == 6 }}"
            sequence:
              - action: script.nabaztag_stretch
          - conditions:
              - condition: template
                value_template: "{{ action_type == 7 }}"
            sequence:
              - action: script.nabaztag_yawn
          - conditions:
              - condition: template
                value_template: "{{ action_type == 8 }}"
            sequence:
              - action: script.nabaztag_ear_dance
          - conditions:
              - condition: template
                value_template: "{{ action_type == 9 }}"
            sequence:
              - action: script.nabaztag_random_sound
          - conditions:
              - condition: template
                value_template: "{{ action_type == 10 }}"
            sequence:
              - action: script.nabaztag_surprise_action

  # Dire une blague
  nabaztag_tell_joke:
    alias: "Nabaztag - Raconter une blague"
    sequence:
      - action: rest_command.nabaztag_communication
      - delay: "00:00:01"
      - action: rest_command.nabaztag_say
        data:
          message: >
            {% set jokes = [
              "Pourquoi les plongeurs plongent-ils toujours en arrière et jamais en avant ? Parce que sinon ils tombent dans le bateau !",
              "Que dit un escargot quand il croise une limace ? Regarde un nudiste !",
              "Qu'est-ce qui est jaune et qui attend ? Jonathan !",
              "Pourquoi les poissons n'aiment pas jouer au tennis ? Parce qu'ils ont peur du filet !",
              "Comment appelle-t-on un chat tomber dans un pot de peinture le jour de Noël ? Un chat-mallow !",
              "Que dit un informaticien quand il se noie ? F1 F1 !",
              "Comment fait-on pour allumer un barbecue breton ? On utilise des breizh !",
              "Qu'est-ce qui est transparent et qui sent la carotte ? Un pet de lapin !",
              "Pourquoi Mickey Mouse ? Parce que Mario Bros !"
            ] %}
            {{ jokes | random }}

  # Annoncer la météo
  nabaztag_announce_weather:
    alias: "Nabaztag - Annoncer la météo"
    sequence:
      - variables:
          weather_value: "{{ states('input_number.nabaztag_weather') | int }}"
          ear_position: >
            {% if weather_value == 0 %}0
            {% elif weather_value == 1 %}4
            {% elif weather_value == 2 %}6
            {% elif weather_value == 3 %}8
            {% elif weather_value == 4 %}7
            {% elif weather_value == 5 %}5
            {% else %}4
            {% endif %}
      - action: rest_command.nabaztag_weather
        data:
          weather: "{{ weather_value }}"
      - action: rest_command.nabaztag_left_ear
        data:
          position: "{{ ear_position }}"
      - action: rest_command.nabaztag_right_ear
        data:
          position: "{{ ear_position }}"
      - delay: "00:00:02"
      - action: rest_command.nabaztag_say
        data:
          message: >
            {% set weather_msgs = {
              0: "Le ciel est dégagé, il fait beau !",
              1: "Le temps est partiellement nuageux.",
              2: "Il y a du brouillard, la visibilité est réduite.",
              3: "Il pleut actuellement, prévoyez un parapluie.",
              4: "Il neige dehors, attention aux routes glissantes.",
              5: "Attention, il y a de l'orage !"
            } %}
            {{ weather_msgs.get(weather_value, "Météo inconnue") }}

  # Annoncer l'heure
  nabaztag_announce_time:
    alias: "Nabaztag - Annoncer l'heure"
    sequence:
      - action: rest_command.nabaztag_ack
      - delay: "00:00:01"
      - action: rest_command.nabaztag_say
        data:
          message: "Il est {{ now().strftime('%H heures %M') }}"

  # Étirement
  nabaztag_stretch:
    alias: "Nabaztag - S'étirer"
    sequence:
      - action: rest_command.nabaztag_say
        data:
          message: "{{ ['Allez un petit étirement !', 'Il est temps de se dégourdir !', 'Un peu d\\'exercice !'] | random }}"
      - delay: "00:00:05"
      - action: rest_command.nabaztag_taichi

  # Bâillement
  nabaztag_yawn:
    alias: "Nabaztag - Bâiller"
    sequence:
      - action: rest_command.nabaztag_say
        data:
          message: "{{ ['Haaaaa petit bâillement !', 'Je suis un peu fatigué', 'Hooooo excusez-moi'] | random }}"
      - action: rest_command.nabaztag_left_ear
        data:
          position: 0
      - action: rest_command.nabaztag_right_ear
        data:
          position: 0
      - delay: "00:00:02"
      - action: rest_command.nabaztag_left_ear
        data:
          position: 16
      - action: rest_command.nabaztag_right_ear
        data:
          position: 16
      - delay: "00:00:01"
      - action: rest_command.nabaztag_left_ear
        data:
          position: 8
      - action: rest_command.nabaztag_right_ear
        data:
          position: 8

  # Danse des oreilles
  nabaztag_ear_dance:
    alias: "Nabaztag - Danse des oreilles"
    sequence:
      - action: rest_command.nabaztag_communication
      - repeat:
          count: 3
          sequence:
            - action: rest_command.nabaztag_left_ear
              data:
                position: "{{ range(0, 11) | random }}"
            - action: rest_command.nabaztag_right_ear
              data:
                position: "{{ range(0, 11) | random }}"
            - delay: "00:00:00.5"
      - action: rest_command.nabaztag_left_ear
        data:
          position: 8
      - action: rest_command.nabaztag_right_ear
        data:
          position: 8

  # Son aléatoire
  nabaztag_random_sound:
    alias: "Nabaztag - Son aléatoire"
    sequence:
      - variables:
          sound_choice: "{{ range(1, 4) | random }}"
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ sound_choice == 1 }}"
            sequence:
              - action: rest_command.nabaztag_communication
          - conditions:
              - condition: template
                value_template: "{{ sound_choice == 2 }}"
            sequence:
              - action: rest_command.nabaztag_ack
          - conditions:
              - condition: template
                value_template: "{{ sound_choice == 3 }}"
            sequence:
              - action: rest_command.nabaztag_ministop

  # Danse complète
  nabaztag_dance:
    alias: "Nabaztag - Danse"
    sequence:
      - action: rest_command.nabaztag_taichi
      - delay: "00:00:02"
      - repeat:
          count: 3
          sequence:
            - action: rest_command.nabaztag_left_ear
              data:
                position: "{{ range(0, 11) | random }}"
            - action: rest_command.nabaztag_right_ear
              data:
                position: "{{ range(0, 11) | random }}"
            - delay: "00:00:00.5"

  # Action surprise
  nabaztag_surprise_action:
    alias: "Nabaztag - Surprise"
    sequence:
      - action: script.turn_on
        target:
          entity_id: script.nabaztag_dance
      - delay: "00:00:05"
      - action: rest_command.nabaztag_surprise

  # ========== SPEECH SCRIPTS ==========

  # Dire la météo
  nabaztag_say_weather:
    alias: "Nabaztag - Dire la météo"
    sequence:
      - variables:
          weather_value: "{{ states('input_number.nabaztag_weather') | int }}"
      - action: rest_command.nabaztag_say
        data:
          message: >
            {% set weather_msgs = {
              0: "Le ciel est dégagé, il fait beau !",
              1: "Le temps est partiellement nuageux.",
              2: "Il y a du brouillard, la visibilité est réduite.",
              3: "Il pleut actuellement, prévoyez un parapluie.",
              4: "Il neige dehors, attention aux routes glissantes.",
              5: "Attention, il y a de l'orage !"
            } %}
            {{ weather_msgs.get(weather_value, "Météo inconnue") }}

  # Dire le trafic
  nabaztag_say_traffic:
    alias: "Nabaztag - Dire le trafic"
    sequence:
      - variables:
          traffic_value: "{{ states('input_number.nabaztag_traffic') | int }}"
      - action: rest_command.nabaztag_say
        data:
          message: >
            {% set traffic_msgs = {
              0: "Circulation fluide partout, pas de problème.",
              1: "Circulation légèrement dense, tout va bien.",
              2: "Le trafic est modéré, quelques ralentissements.",
              3: "La circulation est dense, prévoyez un peu de retard.",
              4: "Des embouteillages sont signalés sur votre trajet.",
              5: "Le trafic est très chargé, évitez si possible.",
              6: "Bouchon important, restez chez vous si vous pouvez !"
            } %}
            {{ traffic_msgs.get(traffic_value, "Trafic inconnu") }}

  # Dire la pollution
  nabaztag_say_pollution:
    alias: "Nabaztag - Dire la pollution"
    sequence:
      - variables:
          pollution_value: "{{ states('input_number.nabaztag_pollution') | int }}"
      - action: rest_command.nabaztag_say
        data:
          message: >
            {% set pollution_msgs = {
              0: "L'air est excellent, respirer à plein poumons !",
              1: "La qualité de l'air est très bonne.",
              2: "Air de bonne qualité, pas d'inquiétude.",
              3: "Qualité de l'air acceptable, OK pour les activités.",
              4: "Air mediocre, les sensibles doivent limiter les efforts.",
              5: "Mauvaise qualité de l'air, portez un masque dehors.",
              6: "Très mauvaise qualité de l'air, restez à l'intérieur.",
              7: "Qualité de l'air très degradée, évitez les sorties.",
              8: "Alerte pollution élevée, restez prudent.",
              9: "Pollution severe, restez autant que possible à l'intérieur.",
              10: "Alerte maximum pollution, dangereux de sortir !"
            } %}
            {{ pollution_msgs.get(pollution_value, "Pollution inconnue") }}

# ==========================================
# AUTOMATIONS NABAZTAG LIFE
# ==========================================

automation:
  # Génère 2 heures d'actions aléatoires chaque heure
  - id: nabaztag_generate_action_times
    alias: "Nabaztag - Générer heures actions"
    mode: single
    trigger:
      - trigger: time_pattern
        hours: /1
    condition:
      - condition: state
        entity_id: input_boolean.nabaztaglife
        state: "on"
    action:
      - action: script.nabaztag_generate_random_action_times

  # Actions aléatoires aux 2 heures définies
  - id: nabaztag_random_actions_time_1
    alias: "Nabaztag - Action aléatoire 1"
    mode: single
    trigger:
      - trigger: time
        at: input_datetime.nabaztag_random_action_time_1
    condition:
      - condition: state
        entity_id: input_boolean.nabaztaglife
        state: "on"
      - condition: template
        value_template: "{{ (range(1,4) | random) == 1 }}"
    action:
      - action: script.nabaztag_random_action

  - id: nabaztag_random_actions_time_2
    alias: "Nabaztag - Action aléatoire 2"
    mode: single
    trigger:
      - trigger: time
        at: input_datetime.nabaztag_random_action_time_2
    condition:
      - condition: state
        entity_id: input_boolean.nabaztaglife
        state: "on"
      - condition: template
        value_template: "{{ (range(1,4) | random) == 1 }}"
    action:
      - action: script.nabaztag_random_action

  # Actions aux heures pleines
  - id: nabaztag_hourly_action
    alias: "Nabaztag - Action horaire"
    mode: single
    trigger:
      - trigger: time_pattern
        minutes: 0
    condition:
      - condition: state
        entity_id: input_boolean.nabaztaglife
        state: "on"
    action:
      - action: script.nabaztag_announce_time
      - delay: "00:00:05"
      - action: script.nabaztag_random_action

  # Pause déjeuner (12h30)
  - id: nabaztag_lunch_break
    alias: "Nabaztag - Pause déjeuner"
    trigger:
      - trigger: time
        at: "12:30:00"
    condition:
      - condition: state
        entity_id: input_boolean.nabaztaglife
        state: "on"
    action:
      - action: rest_command.nabaztag_say
        data:
          message: "C'est l'heure du déjeuner ! Bon appétit à tous !"

  # Retour de pause déjeuner (13h30)
  - id: nabaztag_back_from_lunch
    alias: "Nabaztag - Retour déjeuner"
    trigger:
      - trigger: time
        at: "13:30:00"
    condition:
      - condition: state
        entity_id: input_boolean.nabaztaglife
        state: "on"
    action:
      - action: rest_command.nabaztag_say
        data:
          message: "J'espère que vous avez bien mangé ! On reprend !"
      - action: script.nabaztag_stretch
