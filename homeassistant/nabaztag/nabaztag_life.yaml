# ==========================================
# NABAZTAG LIFE
# Scripts et automatisations pour un Nabaztag vivant
# ==========================================
#
# Tous les appels REST utilisent rest_command.nabaztag_api

# ==========================================
# SCRIPTS NABAZTAG LIFE
# ==========================================

script:
  # Action aleatoire
  nabaztag_random_action:
    alias: "Nabaztag - Action aleatoire"
    sequence:
      - variables:
          action_type: "{{ range(1, 11) | random }}"
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ action_type == 1 }}"
            sequence:
              - action: script.nabaztag_tell_joke
          - conditions:
              - condition: template
                value_template: "{{ action_type == 2 }}"
            sequence:
              - action: script.nabaztag_say_weather
          - conditions:
              - condition: template
                value_template: "{{ action_type == 3 }}"
            sequence:
              - action: script.nabaztag_say_traffic
          - conditions:
              - condition: template
                value_template: "{{ action_type == 4 }}"
            sequence:
              - action: script.nabaztag_say_pollution
          - conditions:
              - condition: template
                value_template: "{{ action_type == 5 }}"
            sequence:
              - action: script.nabaztag_announce_time
          - conditions:
              - condition: template
                value_template: "{{ action_type == 6 }}"
            sequence:
              - action: script.nabaztag_stretch
          - conditions:
              - condition: template
                value_template: "{{ action_type == 7 }}"
            sequence:
              - action: script.nabaztag_yawn
          - conditions:
              - condition: template
                value_template: "{{ action_type == 8 }}"
            sequence:
              - action: script.nabaztag_ear_dance
          - conditions:
              - condition: template
                value_template: "{{ action_type == 9 }}"
            sequence:
              - action: script.nabaztag_random_sound
          - conditions:
              - condition: template
                value_template: "{{ action_type == 10 }}"
            sequence:
              - action: script.nabaztag_surprise_action

  # Dire une blague
  nabaztag_tell_joke:
    alias: "Nabaztag - Raconter une blague"
    sequence:
      - action: rest_command.nabaztag_api
        data: { endpoint: communication }
      - delay: "00:00:01"
      - action: rest_command.nabaztag_api
        data:
          endpoint: say
          query: >
            t={% set jokes = [
              "Pourquoi les plongeurs plongent-ils toujours en arriere ? Parce que sinon ils tombent dans le bateau !",
              "Que dit un escargot quand il croise une limace ? Regarde un nudiste !",
              "Qu'est-ce qui est jaune et qui attend ? Jonathan !",
              "Pourquoi les poissons n'aiment pas jouer au tennis ? Parce qu'ils ont peur du filet !",
              "Comment appelle-t-on un chat tomber dans un pot de peinture le jour de Noel ? Un chat-mallow !",
              "Que dit un informaticien quand il se noie ? F1 F1 !",
              "Comment fait-on pour allumer un barbecue breton ? On utilise des breizh !",
              "Qu'est-ce qui est transparent et qui sent la carotte ? Un pet de lapin !",
              "Pourquoi Mickey Mouse ? Parce que Mario Bros !"
            ] %}{{ jokes | random | urlencode }}

  # Annoncer la meteo (LED + oreilles + TTS)
  nabaztag_announce_weather:
    alias: "Nabaztag - Annoncer la meteo"
    sequence:
      - variables:
          weather_value: "{{ states('input_number.nabaztag_weather') | int }}"
          ear_position: >
            {% if weather_value == 0 %}0
            {% elif weather_value == 1 %}4
            {% elif weather_value == 2 %}6
            {% elif weather_value == 3 %}8
            {% elif weather_value == 4 %}7
            {% elif weather_value == 5 %}5
            {% else %}4
            {% endif %}
          weather_txt: >
            {% set msgs = {
              0: "Le ciel est dégagé, il fait beau !",
              1: "Le temps est partiellement nuageux.",
              2: "Il y a du brouillard, la visibilité est réduite.",
              3: "Il pleut actuellement, prévoyez un parapluie.",
              4: "Il neige dehors, attention aux routes glissantes.",
              5: "Attention, il y a de l'orage !"
            } %}{{ msgs.get(weather_value, "Meteo inconnue") }}
      - action: rest_command.nabaztag_api
        data:
          endpoint: weather
          query: "v={{ weather_value }}"
      - action: rest_command.nabaztag_api
        data:
          endpoint: left
          query: "p={{ ear_position }}&d=0"
      - action: rest_command.nabaztag_api
        data:
          endpoint: right
          query: "p={{ ear_position }}&d=0"
      - delay: "00:00:02"
      - action: rest_command.nabaztag_api
        data:
          endpoint: say
          query: "t={{ weather_txt | urlencode }}"

  # Annoncer l'heure
  nabaztag_announce_time:
    alias: "Nabaztag - Annoncer l'heure"
    sequence:
      - action: rest_command.nabaztag_api
        data: { endpoint: ack }
      - delay: "00:00:01"
      - action: rest_command.nabaztag_api
        data:
          endpoint: say
          query: "t=Il est {{ now().strftime('%H heures %M') | urlencode }}"

  # Etirement
  nabaztag_stretch:
    alias: "Nabaztag - S'etirer"
    sequence:
      - action: rest_command.nabaztag_api
        data:
          endpoint: say
          query: "t={{ ['Allez un petit etirement !', 'Il est temps de se degourdir !', 'Un peu d exercice !'] | random | urlencode }}"
      - delay: "00:00:05"
      - action: rest_command.nabaztag_api
        data: { endpoint: taichi }

  # Baillement
  nabaztag_yawn:
    alias: "Nabaztag - Baillement"
    sequence:
      - action: rest_command.nabaztag_api
        data:
          endpoint: say
          query: "t={{ ['Haaaaa petit baillement !', 'Je suis un peu fatigue', 'Hooooo excusez-moi'] | random | urlencode }}"
      - action: rest_command.nabaztag_api
        data:
          endpoint: left
          query: "p=0&d=0"
      - action: rest_command.nabaztag_api
        data:
          endpoint: right
          query: "p=0&d=0"
      - delay: "00:00:02"
      - action: rest_command.nabaztag_api
        data:
          endpoint: left
          query: "p=16&d=0"
      - action: rest_command.nabaztag_api
        data:
          endpoint: right
          query: "p=16&d=0"
      - delay: "00:00:01"
      - action: rest_command.nabaztag_api
        data:
          endpoint: left
          query: "p=8&d=0"
      - action: rest_command.nabaztag_api
        data:
          endpoint: right
          query: "p=8&d=0"

  # Danse des oreilles
  nabaztag_ear_dance:
    alias: "Nabaztag - Danse des oreilles"
    sequence:
      - action: rest_command.nabaztag_api
        data: { endpoint: communication }
      - repeat:
          count: 3
          sequence:
            - action: rest_command.nabaztag_api
              data:
                endpoint: left
                query: "p={{ range(0, 11) | random }}&d=0"
            - action: rest_command.nabaztag_api
              data:
                endpoint: right
                query: "p={{ range(0, 11) | random }}&d=0"
            - delay: "00:00:00.5"
      - action: rest_command.nabaztag_api
        data:
          endpoint: left
          query: "p=8&d=0"
      - action: rest_command.nabaztag_api
        data:
          endpoint: right
          query: "p=8&d=0"

  # Son aleatoire
  nabaztag_random_sound:
    alias: "Nabaztag - Son aleatoire"
    sequence:
      - variables:
          sound_choice: "{{ range(1, 4) | random }}"
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ sound_choice == 1 }}"
            sequence:
              - action: rest_command.nabaztag_api
                data: { endpoint: communication }
          - conditions:
              - condition: template
                value_template: "{{ sound_choice == 2 }}"
            sequence:
              - action: rest_command.nabaztag_api
                data: { endpoint: ack }
          - conditions:
              - condition: template
                value_template: "{{ sound_choice == 3 }}"
            sequence:
              - action: rest_command.nabaztag_api
                data: { endpoint: ministop }

  # Danse complete
  nabaztag_dance:
    alias: "Nabaztag - Danse"
    sequence:
      - action: rest_command.nabaztag_api
        data: { endpoint: taichi }
      - delay: "00:00:02"
      - repeat:
          count: 3
          sequence:
            - action: rest_command.nabaztag_api
              data:
                endpoint: left
                query: "p={{ range(0, 11) | random }}&d=0"
            - action: rest_command.nabaztag_api
              data:
                endpoint: right
                query: "p={{ range(0, 11) | random }}&d=0"
            - delay: "00:00:00.5"

  # Action surprise
  nabaztag_surprise_action:
    alias: "Nabaztag - Surprise"
    sequence:
      - action: script.turn_on
        target:
          entity_id: script.nabaztag_dance
      - delay: "00:00:05"
      - action: rest_command.nabaztag_api
        data: { endpoint: surprise }

  # ========== SPEECH SCRIPTS ==========

  # Dire la meteo
  nabaztag_say_weather:
    alias: "Nabaztag - Dire la meteo"
    sequence:
      - variables:
          weather_value: "{{ states('input_number.nabaztag_weather') | int }}"
          weather_txt: >
            {% set msgs = {
              0: "Le ciel est dégagé, il fait beau !",
              1: "Le temps est partiellement nuageux.",
              2: "Il y a du brouillard, la visibilité est réduite.",
              3: "Il pleut actuellement, prévoyez un parapluie.",
              4: "Il neige dehors, attention aux routes glissantes.",
              5: "Attention, il y a de l'orage !"
            } %}{{ msgs.get(weather_value, "Meteo inconnue") }}
      - action: rest_command.nabaztag_api
        data:
          endpoint: say
          query: "t={{ weather_txt | urlencode }}"

  # Dire le trafic
  nabaztag_say_traffic:
    alias: "Nabaztag - Dire le trafic"
    sequence:
      - variables:
          traffic_value: "{{ states('input_number.nabaztag_traffic') | int }}"
          traffic_txt: >
            {% set msgs = {
              0: "Circulation fluide partout, pas de problème.",
              1: "Circulation legerement dense, tout va bien.",
              2: "Le trafic est modere, quelques ralentissements.",
              3: "La circulation est dense, prevoyez un peu de retard.",
              4: "Des embouteillages sont signales sur votre trajet.",
              5: "Le trafic est tres charge, evitez si possible.",
              6: "Bouchon important, restez chez vous si vous pouvez !"
            } %}{{ msgs.get(traffic_value, "Trafic inconnu") }}
      - action: rest_command.nabaztag_api
        data:
          endpoint: say
          query: "t={{ traffic_txt | urlencode }}"

  # Dire la pollution
  nabaztag_say_pollution:
    alias: "Nabaztag - Dire la pollution"
    sequence:
      - variables:
          pollution_value: "{{ states('input_number.nabaztag_pollution') | int }}"
          pollution_txt: >
            {% set msgs = {
              0: "L'air est excellent, respirer a plein poumons !",
              1: "La qualite de l'air est tres bonne.",
              2: "Air de bonne qualite, pas d'inquietude.",
              3: "Qualite de l'air acceptable, OK pour les activites.",
              4: "Air mediocre, les sensibles doivent limiter les efforts.",
              5: "Mauvaise qualite de l'air, portez un masque dehors.",
              6: "Tres mauvaise qualite de l'air, restez a l'interieur.",
              7: "Qualite de l'air tres degradee, evitez les sorties.",
              8: "Alerte pollution elevee, restez prudent.",
              9: "Pollution severe, restez autant que possible a l'interieur.",
              10: "Alerte maximum pollution, dangereux de sortir !"
            } %}{{ msgs.get(pollution_value, "Pollution inconnue") }}
      - action: rest_command.nabaztag_api
        data:
          endpoint: say
          query: "t={{ pollution_txt | urlencode }}"

# ==========================================
# AUTOMATIONS NABAZTAG LIFE
# ==========================================

automation:
  - id: nabaztag_generate_action_times
    alias: "Nabaztag - Generer heures actions"
    mode: single
    trigger:
      - trigger: time_pattern
        hours: /1
    condition:
      - condition: state
        entity_id: input_boolean.nabaztaglife
        state: "on"
    action:
      - action: script.nabaztag_generate_random_action_times

  - id: nabaztag_random_actions_time_1
    alias: "Nabaztag - Action aleatoire 1"
    mode: single
    trigger:
      - trigger: time
        at: input_datetime.nabaztag_random_action_time_1
    condition:
      - condition: state
        entity_id: input_boolean.nabaztaglife
        state: "on"
      - condition: template
        value_template: "{{ (range(1,4) | random) == 1 }}"
    action:
      - action: script.nabaztag_random_action

  - id: nabaztag_random_actions_time_2
    alias: "Nabaztag - Action aleatoire 2"
    mode: single
    trigger:
      - trigger: time
        at: input_datetime.nabaztag_random_action_time_2
    condition:
      - condition: state
        entity_id: input_boolean.nabaztaglife
        state: "on"
      - condition: template
        value_template: "{{ (range(1,4) | random) == 1 }}"
    action:
      - action: script.nabaztag_random_action

  - id: nabaztag_hourly_action
    alias: "Nabaztag - Action horaire"
    mode: single
    trigger:
      - trigger: time_pattern
        minutes: 0
    condition:
      - condition: state
        entity_id: input_boolean.nabaztaglife
        state: "on"
    action:
      - action: script.nabaztag_announce_time
      - delay: "00:00:05"
      - action: script.nabaztag_random_action

  - id: nabaztag_lunch_break
    alias: "Nabaztag - Pause dejeuner"
    trigger:
      - trigger: time
        at: "12:30:00"
    condition:
      - condition: state
        entity_id: input_boolean.nabaztaglife
        state: "on"
    action:
      - action: rest_command.nabaztag_api
        data:
          endpoint: say
          query: "t=C'est l'heure du dejeuner ! Bon appetit a tous !"

  - id: nabaztag_back_from_lunch
    alias: "Nabaztag - Retour dejeuner"
    trigger:
      - trigger: time
        at: "13:30:00"
    condition:
      - condition: state
        entity_id: input_boolean.nabaztaglife
        state: "on"
    action:
      - action: rest_command.nabaztag_api
        data:
          endpoint: say
          query: "t=J'espere que vous avez bien mange ! On reprend !"
      - action: script.nabaztag_stretch
