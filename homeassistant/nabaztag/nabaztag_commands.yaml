    {{ states('input_text.nabaztag_ip_address') }}
    "9 play-midi"
  nabaztag_telnet_ack: >
    python3 /config/python_scripts/nab-telnet.py
    {{ states('input_text.nabaztag_ip_address') }}
    "4 play-midi"
  nabaztag_telnet_ministop: >
    python3 /config/python_scripts/nab-telnet.py
    {{ states('input_text.nabaztag_ip_address') }}
    "1 play-midi"
  nabaztag_telnet_surprise: >
