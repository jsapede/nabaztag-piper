# =========================
# Nabaztag - REST Commands
# =========================
#
# 2 commands suffisent pour tous les endpoints firmware
#
# ┌──────────────────────────────────────────────────────────────────────┐
# │ nabaztag_api — Endpoints supportés (GET)                            │
# ├────────────┬────────────────────────────────┬───────────────────────┤
# │ endpoint   │ query                          │ description           │
# ├────────────┼────────────────────────────────┼───────────────────────┤
# │ say        │ t=texte (urlencode)            │ Parler (TTS Piper)    │
# │ left       │ p=0..16&d=0                    │ Oreille gauche        │
# │ right      │ p=0..16&d=0                    │ Oreille droite        │
# │ nose       │ v=0..4                         │ LED Nez               │
# │ weather    │ v=0..5                         │ LED Météo             │
# │ traffic    │ v=0..6                         │ LED Trafic            │
# │ pollution  │ v=0..10                        │ LED Pollution         │
# │ stock      │ v=0..6                         │ LED Stock             │
# │ mail       │ v=0..6                         │ LED Mail              │
# │ service4   │ v=0..6                         │ LED Service 4         │
# │ service5   │ v=0..6                         │ LED Service 5         │
# │ clear      │ (aucun)                        │ Reset toutes LEDs     │
# │ setup      │ j=&k=&l=&c=&d=&w=&b=&t=        │ Config complète       │
# │ communication│ (aucun)                      │ Son communication     │
# │ ack        │ (aucun)                        │ Son ack               │
# │ ministop   │ (aucun)                        │ Son ministop          │
# │ surprise   │ (aucun)                        │ Son surprise          │
# │ taichi     │ (aucun)                        │ Mouvement taichi      │
# │ play       │ u=url (urlencode)              │ Jouer audio URL       │
# │ sleep      │ (aucun)                        │ Mise en veille        │
# │ wakeup     │ (aucun)                        │ Réveil                │
# │ stop       │ (aucun)                        │ Stop tout             │
# │ reboot     │ (aucun)                        │ Redémarrage           │
# │ update-time│ (aucun)                        │ Sync NTP              │
# └────────────┴────────────────────────────────┴───────────────────────┘

rest_command:

  nabaztag_api:
    url: "http://{{ states('input_text.nabaztag_ip_address') }}/{{ endpoint }}{% if query %}?{{ query }}{% endif %}"
    method: get
    timeout: 30

  # ┌──────────────────────────────────────────────────────────────────┐
  # │ nabaztag_autocontrol — 4 flags firmware en 1 appel              │
  # ├──────────┬─────┬────────────────────────────────────────────────┤
  # │ Flag     │ clé │ valeurs                                       │
  # ├──────────┼─────┼───────────────────────────────────────────────┤
  # │ Horloge  │  c  │ 0=off / 1=on (defaut firmware: 1)            │
  # │ Demi-h   │  h  │ 0=off / 1=on (defaut firmware: 1)            │
  # │ Surprise │  s  │ 0=off / 1=on (defaut firmware: 1)            │
  # │ Taichi   │  t  │ 0=off / 1=on (defaut firmware: 1)            │
  # └──────────┴─────┴───────────────────────────────────────────────┘
  # Tous les parametres sont optionnels (| default('') = ignore par le firmware)

  nabaztag_autocontrol:
    url: "http://{{ states('input_text.nabaztag_ip_address') }}/autocontrol?c={{ clock | default('') }}&h={{ halftime | default('') }}&s={{ surprise | default('') }}&t={{ taichi | default('') }}"
    method: get
    timeout: 10
