# =========================
# Nabaztag - REST Commands (telnet impossible)
# =========================

rest_command:
  nabaztag_stop:
    url: "http://{{ states('input_text.nabaztag_ip_address') }}/stop"
    method: get
    timeout: 30
  nabaztag_reboot:
    url: "http://{{ states('input_text.nabaztag_ip_address') }}/reboot"
    method: get
    timeout: 60
  nabaztag_say:
    url: "http://{{ states('input_text.nabaztag_ip_address') }}/say?t={{ message }}"
    method: get
    timeout: 30
  nabaztag_nose:
    url: "http://{{ states('input_text.nabaztag_ip_address') }}/nose?v={{ state }}"
    method: get
    timeout: 10
  nabaztag_setup:
    url: "http://{{ states('input_text.nabaztag_ip_address') }}/setup?j={{ state_attr('zone.home', 'latitude') | round(3) }}&k={{ state_attr('zone.home', 'longitude') | round(3) }}&l={{ states('input_select.nabaztag_language') }}&c={{ {'Europe/Paris': 'PAR', 'Europe/London': 'LON', 'America/New_York': 'NYC', 'Asia/Tokyo': 'TYO'}[states('input_select.nabaztag_timezone_city')]|default('PAR') }}&d={{ 1 if is_state('input_boolean.nabaztag_daylight_saving', 'on') else 0 }}&w={{ states('input_number.nabaztag_wake_hour') | int }}&b={{ states('input_number.nabaztag_sleep_hour') | int }}&t={{ states('input_number.nabaztag_taichi_freq') | int }}"
    method: get
    timeout: 10
  nabaztag_setup_dst:
    url: "http://{{ states('input_text.nabaztag_ip_address') }}/setup?j={{ state_attr('zone.home', 'latitude') | round(3) }}&k={{ state_attr('zone.home', 'longitude') | round(3) }}&d={{ (now().dst().total_seconds() > 0) | int }}"
    method: get
    timeout: 10


# =========================
# Nabaztag - Telnet Commands (simple, || true)
# =========================

shell_command:
  nabaztag_switch: >
    python3 /config/python_scripts/nab-switch.py
    {{ feature }} {{ action }}
  nabaztag_telnet_weather: >
    python3 /config/python_scripts/nab-telnet.py
    {{ states('input_text.nabaztag_ip_address') }}
    "{{ states('input_number.nabaztag_weather') | int }} 1 info-set"
  nabaztag_telnet_traffic: >
    python3 /config/python_scripts/nab-telnet.py
    {{ states('input_text.nabaztag_ip_address') }}
    "{{ states('input_number.nabaztag_traffic') | int }} 3 info-set"
  nabaztag_telnet_pollution: >
    python3 /config/python_scripts/nab-telnet.py
    {{ states('input_text.nabaztag_ip_address') }}
    "{{ states('input_number.nabaztag_pollution') | int }} 7 info-set"
  nabaztag_telnet_clock: >
    python3 /config/python_scripts/nab-telnet.py
    {{ states('input_text.nabaztag_ip_address') }}
    "{{ clock | int }} autoclock-enabled !"
