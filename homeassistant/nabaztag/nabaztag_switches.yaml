# =========================
# Nabaztag - Switches (template)
# =========================
#
# Template switches avec lecture immédiate via update_entity :
#   Toggle → shell_command (telnet) → delay 1s → update_entity sensor
#   → value_template lit l'attribut → état du switch à jour en ~2s
#

switch:
  - platform: template
    switches:
      nabaztag_clock:
        friendly_name: "Nabaztag Clock"
        value_template: "{{ 'on' if state_attr('sensor.nabaztag_telnet_status', 'autoclock') == 1 else 'off' }}"
        turn_on:
          - action: shell_command.nabaztag_switch
            data: { feature: clock, action: on }
          - delay: { seconds: 1 }
          - action: homeassistant.update_entity
            target: { entity_id: sensor.nabaztag_telnet_status }
        turn_off:
          - action: shell_command.nabaztag_switch
            data: { feature: clock, action: off }
          - delay: { seconds: 1 }
          - action: homeassistant.update_entity
            target: { entity_id: sensor.nabaztag_telnet_status }

