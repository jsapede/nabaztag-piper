# =========================
# Nabaztag - Switches (template)
# =========================
#
# Template switches qui :
#   1. Envoient la commande telnet (shell_command avec templates)
#   2. Attendent 1s
#   3. Forcent une relecture du sensor (update_entity)
#   4. value_template lit l'attribut du sensor → immédiat
#
# Temps total ~2s pour voir le changement.
#

switch:
  - platform: template
    switches:
      nabaztag_clock:
        friendly_name: "Nabaztag Clock"
        value_template: "{{ 'on' if state_attr('sensor.nabaztag_telnet_status', 'autoclock') == 1 else 'off' }}"
        turn_on:
          - action: shell_command.nabaztag_switch
            data:
              feature: clock
              action: on
          - delay:
              seconds: 1
          - action: homeassistant.update_entity
            target:
              entity_id: sensor.nabaztag_telnet_status
        turn_off:
          - action: shell_command.nabaztag_switch
            data:
              feature: clock
              action: off
          - delay:
              seconds: 1
          - action: homeassistant.update_entity
            target:
              entity_id: sensor.nabaztag_telnet_status

      nabaztag_halftime:
