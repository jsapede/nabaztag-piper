# =========================
# Nabaztag - Switches (command_line)
# =========================
#
# Toute la logique est dans python_scripts/nab-switch.py.
# Plus de templates HA dans les commandes (non supportés en format unifié).
#

command_line:
  - switch:
      name: "Nabaztag Clock"
      unique_id: nabaztag_clock
      command_on: "python3 /config/python_scripts/nab-switch.py clock on"
      command_off: "python3 /config/python_scripts/nab-switch.py clock off"
      command_state: "python3 /config/python_scripts/nab-read-status.py 192.168.0.58"
      value_template: "{{ (value | from_json).autoclock == 1 }}"

  - switch:
      name: "Nabaztag Halftime"
      unique_id: nabaztag_halftime
      command_on: "python3 /config/python_scripts/nab-switch.py halftime on"
      command_off: "python3 /config/python_scripts/nab-switch.py halftime off"
      command_state: "python3 /config/python_scripts/nab-read-status.py 192.168.0.58"
      value_template: "{{ (value | from_json).autohalftime == 1 }}"

  - switch:
      name: "Nabaztag Surprise"
      unique_id: nabaztag_surprise
      command_on: "python3 /config/python_scripts/nab-switch.py surprise on"
      command_off: "python3 /config/python_scripts/nab-switch.py surprise off"
      command_state: "python3 /config/python_scripts/nab-read-status.py 192.168.0.58"
      value_template: "{{ (value | from_json).autosurprise == 1 }}"

  - switch:
      name: "Nabaztag Taichi"
      unique_id: nabaztag_taichi
      command_on: "python3 /config/python_scripts/nab-switch.py taichi on"
      command_off: "python3 /config/python_scripts/nab-switch.py taichi off"
      command_state: "python3 /config/python_scripts/nab-read-status.py 192.168.0.58"
      value_template: "{{ (value | from_json).autotaichi == 1 }}"

  - switch:
      name: "Nabaztag Weather"
      unique_id: nabaztag_weather
      command_on: "python3 /config/python_scripts/nab-switch.py weather on"
      command_off: "python3 /config/python_scripts/nab-switch.py weather off"
      command_state: "python3 /config/python_scripts/nab-read-status.py 192.168.0.58"
      value_template: "{{ (value | from_json).weather != -1 }}"

  - switch:
      name: "Nabaztag Traffic"
      unique_id: nabaztag_traffic
      command_on: "python3 /config/python_scripts/nab-switch.py traffic on"
      command_off: "python3 /config/python_scripts/nab-switch.py traffic off"
      command_state: "python3 /config/python_scripts/nab-read-status.py 192.168.0.58"
      value_template: "{{ (value | from_json).traffic != -1 }}"

  - switch:
      name: "Nabaztag Pollution"
      unique_id: nabaztag_pollution
      command_on: "python3 /config/python_scripts/nab-switch.py pollution on"
      command_off: "python3 /config/python_scripts/nab-switch.py pollution off"
      command_state: "python3 /config/python_scripts/nab-read-status.py 192.168.0.58"
      value_template: "{{ (value | from_json).pollution != -1 }}"

  - switch:
      name: "Nabaztag Nose"
      unique_id: nabaztag_nose
      command_on: "python3 /config/python_scripts/nab-switch.py nose on"
      command_off: "python3 /config/python_scripts/nab-switch.py nose off"
