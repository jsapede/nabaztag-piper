            data:
              feature: taichi
              action: on
          - delay:
              seconds: 1
          - action: homeassistant.update_entity
            target:
              entity_id: sensor.nabaztag_telnet_status
        turn_off:
          - action: shell_command.nabaztag_switch
            data:
              feature: taichi
              action: off
          - delay:
              seconds: 1
          - action: homeassistant.update_entity
            target:
              entity_id: sensor.nabaztag_telnet_status

      nabaztag_weather:
        friendly_name: "Nabaztag Weather"
        value_template: "{{ 'on' if state_attr('sensor.nabaztag_telnet_status', 'weather') != -1 else 'off' }}"

  - switch:
      name: "Nabaztag Traffic"
      friendly_name: "Nabaztag Traffic"
      value_template: "{{ 'on' if state_attr('sensor.nabaztag_telnet_status', 'traffic') != -1 else 'off' }}"

