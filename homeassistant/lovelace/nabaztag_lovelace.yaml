          {% endif %}
        tap_action:
          action: toggle
        vertical: false

      - type: custom:mushroom-template-card
        entity: input_boolean.nabaztag_firmware_taichi
        icon: mdi:meditation
        primary: Anim Taichi
        color: |
          {% if is_state(entity, 'on') and state_attr('sensor.nabaztag_telnet_status', 'autotaichi') == 1 %}
            green
          {% elif is_state(entity, 'on') %}
            orange
          {% else %}
            disabled
          {% endif %}
        tap_action:
          action: toggle
        vertical: false

      - type: custom:mushroom-template-card
        entity: input_boolean.nabaztag_weather_enabled
        icon: mdi:weather-partly-cloudy
        primary: LED météo
        color: |
          {% if is_state(entity, 'on') and state_attr('sensor.nabaztag_telnet_status', 'weather') not in [None, -1] %}
            green
          {% elif is_state(entity, 'on') %}
