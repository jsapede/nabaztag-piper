type: vertical-stack
cards:
  # ========== HEADER ==========
  - type: markdown
    content: |
      # 🐇 **Nabaztag**
      Switches → commande telnet directe. État vérifié par telnet toutes les 30s.

  # ========== CONFIGURATION ==========
  - type: entities
    title: Configuration
    show_header_toggle: false
    state_color: false
    entities:
      - entity: input_select.nabaztag_language
        name: Langue
      - entity: input_select.nabaztag_timezone_city
        name: Ville / fuseau
      - entity: input_boolean.nabaztag_auto_dst
        name: Auto DST
      - entity: input_number.nabaztag_wake_hour
        name: Réveil heure
      - entity: input_number.nabaztag_sleep_hour
        name: Coucher heure
      - entity: input_number.nabaztag_taichi_freq
        name: Fréquence Taichi
      - entity: input_text.nabaztag_message
        name: Message à dire
      - type: button
        name: Dire le message
        icon: mdi:volume-high
        tap_action:
          action: call-service
          service: script.nabaztag_talk
          target: {}

  # ========== PARAMETRES ==========
  - type: markdown
    content: "## ⚙️ Paramètres (switches)"
  - type: grid
    columns: 2
    square: false
    cards:
      - type: custom:mushroom-template-card
        entity: switch.nabaztag_clock
        icon: mdi:clock-outline
        primary: Annonce heure
        color: |
          {% if is_state(entity, 'on') and state_attr('sensor.nabaztag_telnet_status', 'autoclock') == 1 %}
            green
          {% elif is_state(entity, 'on') %}
            orange
          {% else %}
            disabled
          {% endif %}
        tap_action:
          action: toggle
        vertical: false

      - type: custom:mushroom-template-card
        entity: switch.nabaztag_halftime
        icon: mdi:bell-ring-outline
        primary: Annonce 1/2 heure
        color: |
          {% if is_state(entity, 'on') and state_attr('sensor.nabaztag_telnet_status', 'autohalftime') == 1 %}
            green
          {% elif is_state(entity, 'on') %}
            orange
          {% else %}
            disabled
          {% endif %}
        tap_action:
          action: toggle
        vertical: false

      - type: custom:mushroom-template-card
        entity: switch.nabaztag_surprise
        icon: mdi:gift-outline
        primary: Sons surprise
        color: |
          {% if is_state(entity, 'on') and state_attr('sensor.nabaztag_telnet_status', 'autosurprise') == 1 %}
            green
          {% elif is_state(entity, 'on') %}
            orange
          {% else %}
            disabled
          {% endif %}
        tap_action:
          action: toggle
        vertical: false

      - type: custom:mushroom-template-card
        entity: switch.nabaztag_taichi
        icon: mdi:meditation
        primary: Anim Taichi
        color: |
          {% if is_state(entity, 'on') and state_attr('sensor.nabaztag_telnet_status', 'autotaichi') == 1 %}
            green
          {% elif is_state(entity, 'on') %}
            orange
          {% else %}
            disabled
          {% endif %}
        tap_action:
          action: toggle
        vertical: false

      - type: custom:mushroom-template-card
        entity: switch.nabaztag_weather
        icon: mdi:weather-partly-cloudy
        primary: LED météo
        color: |
          {% if is_state(entity, 'on') and state_attr('sensor.nabaztag_telnet_status', 'weather') not in [None, -1] %}
            green
          {% elif is_state(entity, 'on') %}
            orange
          {% else %}
            disabled
          {% endif %}
        tap_action:
          action: toggle
        vertical: false

      - type: custom:mushroom-template-card
        entity: switch.nabaztag_traffic
        icon: mdi:car
        primary: LED trafic
        color: |
          {% if is_state(entity, 'on') and state_attr('sensor.nabaztag_telnet_status', 'traffic') not in [None, -1] %}
            green
          {% elif is_state(entity, 'on') %}
            orange
          {% else %}
            disabled
          {% endif %}
        tap_action:
          action: toggle
        vertical: false

      - type: custom:mushroom-template-card
        entity: switch.nabaztag_pollution
        icon: mdi:factory
        primary: LED pollution
        color: |
          {% if is_state(entity, 'on') and state_attr('sensor.nabaztag_telnet_status', 'pollution') not in [None, -1] %}
            green
          {% elif is_state(entity, 'on') %}
            orange
          {% else %}
            disabled
          {% endif %}
        tap_action:
          action: toggle
        vertical: false

      - type: custom:mushroom-template-card
        entity: switch.nabaztag_nose
        icon: mdi:lightbulb-on-outline
        primary: LED Nez
        color: |
          {% if is_state(entity, 'on') %}
            green
          {% else %}
            disabled
          {% endif %}
        tap_action:
          action: toggle
        vertical: false

      - type: custom:mushroom-template-card
        entity: input_boolean.nabaztag_traffic_auto_update
        icon: mdi:car-clock
        primary: Màj trafic auto HA
        color: |
          {% if is_state(entity, 'on') %}
