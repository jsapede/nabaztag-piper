type: vertical-stack
cards:
  # ========== HEADER ==========
  - type: markdown
    content: |
      # 🐇 **Nabaztag**
      État firmware interrogé par telnet toutes les 30s.
      {% set u = state_attr('sensor.nabaztag_telnet_status', 'uptime') | int(0) %}
      {% set d = u // 86400 %} {% set h = (u % 86400) // 3600 %} {% set m = (u % 3600) // 60 %}
      {% if u > 0 %}Uptime : **{{ d }}j {{ h }}h {{ m }}m**{% else %}🔄 Reboot en cours...{% endif %}

  # ========== SYNCHRONISATION ==========
  - type: entities
    title: 🔄 Synchronisation HA ↔ Lapin
    show_header_toggle: false
    entities:
      - entity: binary_sensor.configuration_firmware_synchronisee
        name: Configuration
      - entity: sensor.nabaztag_telnet_status
        attribute: uptime
        name: Redémarrage détecté
      - entity: sensor.nabaztag_telnet_status
        attribute: sleep_state
        name: Lapin endormi
      - type: button
        name: Forcer setup complet
        icon: mdi:send
        tap_action:
          action: call-service
          service: rest_command.nabaztag_setup
          target: {}

  # ========== CONFIGURATION ==========
  - type: entities
    title: Configuration
    show_header_toggle: false
    state_color: false
    entities:
      - entity: input_select.nabaztag_language
        name: Langue
      - entity: input_select.nabaztag_timezone_city
        name: Ville / fuseau
      - entity: input_boolean.nabaztag_auto_dst
        name: Auto DST
      - entity: input_number.nabaztag_wake_hour
        name: Réveil heure
      - entity: input_number.nabaztag_sleep_hour
        name: Coucher heure
      - entity: input_number.nabaztag_taichi_freq
        name: Fréquence Taichi
      - entity: input_text.nabaztag_message
        name: Message à dire
      - type: button
        name: Dire le message
        icon: mdi:volume-high
        tap_action:
          action: call-service
          service: script.nabaztag_talk
          target: {}

  # ========== PARAMETRES ==========
  - type: markdown
    content: "## ⚙️ Paramètres"
  - type: grid
    columns: 2
    square: false
    cards:
      - type: custom:mushroom-template-card
        entity: input_boolean.nabaztag_firmware_clock
        icon: mdi:clock-outline
        primary: Annonce heure
        color: |
          {% if is_state(entity, 'on') and state_attr('sensor.nabaztag_telnet_status', 'autoclock') == 1 %}
            green
          {% elif is_state(entity, 'on') %}
            orange
          {% else %}
            disabled
          {% endif %}
        tap_action:
          action: toggle
        vertical: false

      - type: custom:mushroom-template-card
        entity: input_boolean.nabaztag_firmware_halftime
        icon: mdi:bell-ring-outline
        primary: Annonce 1/2 heure
        color: |
          {% if is_state(entity, 'on') and state_attr('sensor.nabaztag_telnet_status', 'autohalftime') == 1 %}
            green
          {% elif is_state(entity, 'on') %}
            orange
          {% else %}
            disabled
          {% endif %}
        tap_action:
          action: toggle
        vertical: false

      - type: custom:mushroom-template-card
        entity: input_boolean.nabaztag_firmware_surprise
        icon: mdi:gift-outline
        primary: Sons surprise
        color: |
          {% if is_state(entity, 'on') and state_attr('sensor.nabaztag_telnet_status', 'autosurprise') == 1 %}
            green
          {% elif is_state(entity, 'on') %}
            orange
          {% else %}
