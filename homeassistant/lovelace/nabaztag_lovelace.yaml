    entities:
      - entity: switch.nabaztag_firmware_clock
        name: Horloge (heur)
      - entity: switch.nabaztag_firmware_halftime
        name: Demi-heure
      - entity: switch.nabaztag_firmware_surprise
        name: Surprise
      - entity: switch.nabaztag_firmware_taichi
        name: Taichi