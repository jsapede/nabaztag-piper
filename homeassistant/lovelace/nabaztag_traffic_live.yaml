type: markdown
content: >
  <style>
    .tl-wrap { text-align: center; padding: 8px 0; }
    .tl-led {
      display: inline-block; width: 36px; height: 36px; border-radius: 50%;
      margin: 6px 8px; vertical-align: middle;
      animation-name: tl-snake;
      animation-timing-function: ease-in-out;
      animation-iteration-count: infinite;
    }
    @keyframes tl-snake {
      0%, 15% { opacity: 1; transform: scale(1); }
      20%, 100% { opacity: 0.08; transform: scale(0.6); }
    }
  </style>

  {% set level = states('input_number.nabaztag_traffic') | int(0) %}
  {% set hex = {0:'#000000', 2:'#00cc00', 15:'#ff8000', 1:'#ff0000'} %}
  {% set pal = [
    [2,2,2],
    [2,2,15],
    [2,15,15],
    [15,15,15],
    [15,1,1],
    [1,1,1],
    [1,1,1]
  ] %}
  {% set speed_ms = [300, 600, 900, 1500, 2500, 4000, 6000] %}
  {% set label = ['Libre','Correct','Modéré','Dense','Embouteillage','Très chargé','Extrême'] %}
  {% set s = speed_ms[level] %}
  {% set c = pal[level] %}

  <h2 style="text-align:center;margin:0">🚗 Trafic — {{ label[level] }}</h2>

  <div class="tl-wrap">
    <div class="tl-led" style="background:{{ hex[c[0]] }};animation-duration:{{ s }}ms;animation-delay:0ms"></div>
    <div class="tl-led" style="background:{{ hex[c[1]] }};animation-duration:{{ s }}ms;animation-delay:{{ (s / 3) | int }}ms"></div>
    <div class="tl-led" style="background:{{ hex[c[2]] }};animation-duration:{{ s }}ms;animation-delay:{{ (s * 2 / 3) | int }}ms"></div>
  </div>

  <p style="text-align:center;margin:0;color:var(--secondary-text-color)">Niveau {{ level }}</p>
