type: custom:config-template-card
variables:
  - level: "{{ states('input_number.nabaztag_traffic') | int(0) }}"
  - speed: "{{ [0.3, 0.6, 0.9, 1.5, 2.5, 4.0, 6.0] }}"
  - hex: "{{ ['#000','#f00','#0c0','#ff0','#00f','#f0f','#0ff','#fff','#808080','#ff8080','#80ff80','#fc0','#8080ff','#ff80ff','#80ffff','#ff8000'] }}"
  - pal: "{{ [[2,2,2],[2,2,15],[2,15,15],[15,15,15],[15,1,1],[1,1,1],[1,1,1]] }}"
  - s: "{{ speed[level] }}"
  - c: "{{ pal[level] }}"
  - col0: "{{ hex[c[0]] }}"
  - col1: "{{ hex[c[1]] }}"
  - col2: "{{ hex[c[2]] }}"
  - label: "{{ ['Libre','Correct','Modéré','Dense','Embouteillage','Très chargé','Extrême'][level] }}"
card:
  type: vertical-stack
  cards:
    - type: horizontal-stack
      cards:
        - type: custom:mushroom-template-card
          icon: none
          primary: ""
          card_mod:
            style:
              mushroom-shape-icon$: |
                @keyframes sn {
                  0%, 15% { opacity: 1; filter: brightness(1.4); }
                  20%, 100% { opacity: 0.06; filter: brightness(0.3); }
                }
                .shape {
                  --shape-color: {{ col0 }};
                  --shape-animation: sn {{ s }}s ease-in-out infinite;
                  animation-delay: 0s;
                }

        - type: custom:mushroom-template-card
          icon: none
          primary: ""
          card_mod:
            style:
              mushroom-shape-icon$: |
                @keyframes sn {
                  0%, 15% { opacity: 1; filter: brightness(1.4); }
                  20%, 100% { opacity: 0.06; filter: brightness(0.3); }
                }
                .shape {
                  --shape-color: {{ col1 }};
                  --shape-animation: sn {{ s }}s ease-in-out infinite;
                  animation-delay: {{ (s / 3) | round(2) }}s;
                }

        - type: custom:mushroom-template-card
          icon: none
          primary: ""
          card_mod:
            style:
              mushroom-shape-icon$: |
                @keyframes sn {
                  0%, 15% { opacity: 1; filter: brightness(1.4); }
                  20%, 100% { opacity: 0.06; filter: brightness(0.3); }
                }
                .shape {
                  --shape-color: {{ col2 }};
                  --shape-animation: sn {{ s }}s ease-in-out infinite;
                  animation-delay: {{ (s * 2 / 3) | round(2) }}s;
                }

    - type: entities
      entities:
        - entity: input_number.nabaztag_traffic
          name: "🚗 {{ label }}"
