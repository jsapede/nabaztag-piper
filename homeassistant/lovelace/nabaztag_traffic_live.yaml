type: custom:config-template-card
variables:
  - level: "{{ states('input_number.nabaztag_traffic') | int(0) }}"
  - speed: "{{ [0.3, 0.6, 0.9, 1.5, 2.5, 4.0, 6.0] }}"
  - hex: "{{ ['#000','#ff0000','#00cc00','#ffff00','#0000ff','#ff00ff','#00ffff','#ffffff','#808080','#ff8080','#80ff80','#ffcc00','#8080ff','#ff80ff','#80ffff','#ff8000'] }}"
  - pal: "{{ [[2,2,2],[2,2,15],[2,15,15],[15,15,15],[15,1,1],[1,1,1],[1,1,1]] }}"
  - s: "{{ speed[level] }}"
  - c: "{{ pal[level] }}"
  - col0: "{{ hex[c[0]] }}"
  - col1: "{{ hex[c[1]] }}"
  - col2: "{{ hex[c[2]] }}"
card:
  type: vertical-stack
  cards:
    - type: horizontal-stack
      cards:
        - type: custom:mushroom-template-card
          icon: none
          primary: ""
          card_mod:
            style: |
              mushroom-shape-icon$:
                .shape {
                  --shape-color: {{ col0 }};
                  --shape-animation: snake {{ s }}s ease-in-out infinite;
                  animation-delay: 0s;
                }
              @keyframes snake {
                0%, 15% { opacity: 1; filter: brightness(1.4); }
                20%, 100% { opacity: 0.08; filter: brightness(0.4); }
              }

        - type: custom:mushroom-template-card
          icon: none
          primary: ""
          card_mod:
            style: |
              mushroom-shape-icon$:
                .shape {
                  --shape-color: {{ col1 }};
                  --shape-animation: snake {{ s }}s ease-in-out infinite;
                  animation-delay: {{ (s / 3) | round(2) }}s;
                }
              @keyframes snake {
                0%, 15% { opacity: 1; filter: brightness(1.4); }
                20%, 100% { opacity: 0.08; filter: brightness(0.4); }
              }

        - type: custom:mushroom-template-card
          icon: none
          primary: ""
          card_mod:
            style: |
              mushroom-shape-icon$:
                .shape {
                  --shape-color: {{ col2 }};
                  --shape-animation: snake {{ s }}s ease-in-out infinite;
                  animation-delay: {{ (s * 2 / 3) | round(2) }}s;
                }
              @keyframes snake {
                0%, 15% { opacity: 1; filter: brightness(1.4); }
                20%, 100% { opacity: 0.08; filter: brightness(0.4); }
              }

    - type: entities
      entities:
        - entity: input_number.nabaztag_traffic
          name: Trafic
