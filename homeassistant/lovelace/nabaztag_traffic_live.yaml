type: markdown
card_mod:
  style: |
    ha-card { padding: 16px; background: var(--card-background-color); }
    .traffic-leds { text-align: center; margin: 12px 0; }
    .traffic-led {
      display: inline-block; width: 36px; height: 36px; border-radius: 50%;
      margin: 6px 8px; vertical-align: middle;
      animation: snake var(--speed, 1s) infinite;
    }
    @keyframes snake {
      0%, 18% { opacity: 1; transform: scale(1); filter: brightness(1.2); }
      22%, 100% { opacity: 0.12; transform: scale(0.7); filter: brightness(0.6); }
    }
content: >
  {% set level = states('input_number.nabaztag_traffic') | int(0) %}
  {% set hex = {0:'#000000', 2:'#00cc00', 15:'#ff8000', 1:'#ff0000'} %}
  {% set pal = [
    [2,2,2],
    [2,2,15],
    [2,15,15],
    [15,15,15],
    [15,1,1],
    [1,1,1],
    [1,1,1]
  ] %}
  {% set speed = [0.3, 0.6, 0.9, 1.5, 2.5, 4.0, 6.0] %}
  {% set label = ['Libre','Correct','Modéré','Dense','Embouteillage','Très chargé','Extrême'] %}
  {% set icon = ['🟢','🟡','🟠','🔴','🔴','🔴','🔴'] %}
  {% set c = pal[level] %}

  ## 🚗 Trafic — {{ label[level] }}

  <div class="traffic-leds" style="--speed:{{ speed[level] }}s">
    <div class="traffic-led" style="background:{{ hex[c[0]] }}; animation-delay:0s"></div>
    <div class="traffic-led" style="background:{{ hex[c[1]] }}; animation-delay:calc(var(--speed) / 3)"></div>
    <div class="traffic-led" style="background:{{ hex[c[2]] }}; animation-delay:calc(var(--speed) * 2 / 3)"></div>
  </div>

  Niveau {{ level }}
