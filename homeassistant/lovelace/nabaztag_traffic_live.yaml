type: markdown
card_mod:
  style: |
    @keyframes tl-snake {
      0%, 15% { opacity: 1; transform: scale(1); box-shadow: 0 0 14px currentColor; }
      20%, 100% { opacity: 0.08; transform: scale(0.6); box-shadow: none; }
    }
    .tl-led { animation: tl-snake var(--s) ease-in-out infinite; }
    .tl-wrap { text-align: center; padding: 16px 0; }
    .tl-led {
      display: inline-block; width: 36px; height: 36px; border-radius: 50%;
      margin: 6px 8px; vertical-align: middle;
    }
content: >
  {% set level = states('input_number.nabaztag_traffic') | int(0) %}
  {% set hex = {0:'#000', 2:'#00cc00', 15:'#ff8000', 1:'#ff0000'} %}
  {% set pal = [[2,2,2],[2,2,15],[2,15,15],[15,15,15],[15,1,1],[1,1,1],[1,1,1]] %}
  {% set speed = [0.3, 0.6, 0.9, 1.5, 2.5, 4.0, 6.0] %}
  {% set label = ['Libre','Correct','Modéré','Dense','Embouteillage','Très chargé','Extrême'] %}
  {% set c = pal[level] %}
  {% set s = speed[level] %}

  <h3 style="text-align:center;margin:0 0 8px">🚗 {{ label[level] }}</h3>

  <div class="tl-wrap">
    <div class="tl-led" style="background:{{ hex[c[0]] }};--s:{{ s }}s;animation-delay:0s"></div>
    <div class="tl-led" style="background:{{ hex[c[1]] }};--s:{{ s }}s;animation-delay:{{ (s / 3) | round(2) }}s"></div>
    <div class="tl-led" style="background:{{ hex[c[2]] }};--s:{{ s }}s;animation-delay:{{ (s * 2 / 3) | round(2) }}s"></div>
  </div>

  <p style="text-align:center;margin:0;color:var(--secondary-text-color);font-size:0.85em">Niveau {{ level }}</p>
