type: markdown
card_mod:
  style: |
    @keyframes sn {
      0%, 15% { opacity: 1; transform: scale(1); }
      20%, 100% { opacity: 0.05; transform: scale(0.6); }
    }
content: >
  <div style="text-align:center;padding:12px 0">
    <div style="display:flex;justify-content:center;gap:8px">
      <div style="width:36px;height:36px;border-radius:50%;background:#0c0;
                  animation:sn 0.6s ease-in-out infinite;animation-delay:0s"></div>
      <div style="width:36px;height:36px;border-radius:50%;background:#0c0;
                  animation:sn 0.6s ease-in-out infinite;animation-delay:0.2s"></div>
      <div style="width:36px;height:36px;border-radius:50%;background:#fc0;
                  animation:sn 0.6s ease-in-out infinite;animation-delay:0.4s"></div>
    </div>
  </div>
