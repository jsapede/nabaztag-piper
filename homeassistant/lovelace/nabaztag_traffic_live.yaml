type: horizontal-stack
cards:
  - type: custom:mushroom-template-card
    icon: none
    card_mod:
      style:
        mushroom-shape-icon$: |
          @keyframes sn {
            0%, 15% { opacity: 1; filter: brightness(1.4); }
            20%, 100% { opacity: 0.06; filter: brightness(0.3); }
          }
          .shape {
            --shape-color: #0c0;
            --shape-animation: sn 0.6s ease-in-out infinite;
            animation-delay: 0s;
          }

  - type: custom:mushroom-template-card
    icon: none
    card_mod:
      style:
        mushroom-shape-icon$: |
          @keyframes sn {
            0%, 15% { opacity: 1; filter: brightness(1.4); }
            20%, 100% { opacity: 0.06; filter: brightness(0.3); }
          }
          .shape {
            --shape-color: #0c0;
            --shape-animation: sn 0.6s ease-in-out infinite;
            animation-delay: 0.2s;
          }

  - type: custom:mushroom-template-card
    icon: none
