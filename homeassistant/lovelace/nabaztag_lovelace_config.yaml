type: vertical-stack
cards:
  - type: markdown
    content: |
      # ⚙️ **Configuration Setup Nabaztag**
      ---
      Utiliser le bouton ci-dessous pour envoyer la configuration au Nabaztag.
      Les paramètres sont récupérés depuis les entités de configuration.

  - type: entities
    title: 📍 Localisation & Langue
    show_header_toggle: false
    entities:
      - entity: input_select.nabaztag_language
        name: Langue (l)
        icon: mdi:translate
      - entity: input_select.nabaztag_timezone_city
        name: Ville/Timezone (c)
        icon: mdi:city

  - type: entities
    title: 🕐 Configuration Horaires
    show_header_toggle: false
    entities:
      - entity: input_boolean.nabaztag_daylight_saving
        name: Heure d'été (d)
        icon: mdi:weather-sunny
      - entity: input_number.nabaztag_wake_hour
        name: Heure réveil (w)
        icon: mdi:alarm
      - entity: input_number.nabaztag_wake_minute
        name: Minute réveil (wu)
        icon: mdi:alarm
      - entity: input_number.nabaztag_sleep_hour
        name: Heure coucher (b)
        icon: mdi:sleep
      - entity: input_number.nabaztag_sleep_minute
        name: Minute coucher (bu)
        icon: mdi:sleep
      - entity: input_number.nabaztag_taichi_freq
        name: Fréquence Taichi (t)
        icon: mdi:yoga

  - type: button
    name: Forcer l'envoi de la configuration
    icon: mdi:send
    tap_action:
      action: call-service
      service: rest_command.nabaztag_setup
      target: {}