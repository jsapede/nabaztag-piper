<!DOCTYPE html>
<html>
<head>
    <title>Nabaztag TTS Test</title>
    <style>
        body { font-family: Arial; padding: 20px; max-width: 600px; margin: auto; }
        .test-btn { 
            display: block; 
            width: 100%; 
            padding: 15px; 
            margin: 10px 0;
            font-size: 16px;
            cursor: pointer;
        }
        input { width: 100%; padding: 10px; margin: 10px 0; font-size: 16px; }
    </style>
</head>
<body>
    <h1>Nabaztag TTS Test</h1>
    
    <h2>Proxy Coqui</h2>
    <button class="test-btn" onclick="testTTS('bonjour le petit lapin')">Test: "bonjour le petit lapin"</button>
    
    <h2>Test personnalisé</h2>
    <input type="text" id="customText" placeholder="Entrez votre texte..." value="test">
    <button class="test-btn" onclick="testCustom()">Dire ce texte</button>
    
    <h2>Logs</h2>
    <pre id="log" style="background:#f0f0f0;padding:10px;height:150px;overflow:auto;"></pre>

    <script>
        const NABAZTAG_IP = '192.168.0.58';
        const SERVER_IP = '192.168.0.42';
        
        function log(msg) {
            const el = document.getElementById('log');
            el.textContent += new Date().toLocaleTimeString() + ' ' + msg + '\n';
            el.scrollTop = el.scrollHeight;
        }
        
        function testTTS(text) {
            log('Testing: ' + text);
            // Methode 1: appel direct via fetch
            fetch('http://' + NABAZTAG_IP + '/say?t=' + encodeURIComponent(text))
                .then(r => log('Response: ' + r.status))
                .catch(e => log('Error: ' + e));
        }
        
        function testCustom() {
            const text = document.getElementById('customText').value;
            testTTS(text);
        }
    </script>
</body>
</html>
